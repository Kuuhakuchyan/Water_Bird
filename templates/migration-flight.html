<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>候鸟迁徙记 | 黄河生态方舟</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="../static/app_monitor/css/games.css">
    <style>
        :root {
            --c-sky: #4A90D9;
            --c-sunset: #FF7F50;
            --c-danger: #E74C3C;
            --c-energy: #2ECC71;
        }
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .game-header {
            background: linear-gradient(135deg, #FF7F50, #4A90D9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-header h1 {
            margin: 0;
            font-size: 24px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .canvas-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .game-canvas {
            display: block;
            width: 100%;
        }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .hud-item {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 12px;
            flex: 1;
            text-align: center;
        }
        .hud-item i {
            margin-right: 5px;
        }
        .hud-item .value {
            font-weight: 700;
            font-size: 16px;
        }
        .energy-bar {
            position: absolute;
            top: 60px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 10px;
        }
        .energy-label {
            color: white;
            font-size: 11px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .energy-track {
            height: 14px;
            background: rgba(255,255,255,0.2);
            border-radius: 7px;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #E74C3C, #F39C12, #2ECC71);
            border-radius: 7px;
            transition: width 0.3s ease;
        }
        .altitude-bar {
            position: absolute;
            right: 10px;
            top: 100px;
            width: 30px;
            bottom: 100px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 5px;
        }
        .altitude-track {
            height: 100%;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            position: relative;
        }
        .altitude-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #E74C3C, #F39C12, #2ECC71);
            border-radius: 10px;
            transition: height 0.2s ease;
        }
        .altitude-marker {
            position: absolute;
            left: -5px;
            width: 40px;
            height: 3px;
            background: #FFF;
            border-radius: 2px;
        }
        .altitude-label {
            position: absolute;
            top: -20px;
            color: white;
            font-size: 10px;
            white-space: nowrap;
        }
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        .game-overlay h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .game-overlay p {
            font-size: 16px;
            opacity: 0.8;
            margin: 5px 0;
        }
        .controls-hint {
            margin: 20px 0;
            padding: 15px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            text-align: left;
        }
        .controls-hint p {
            margin: 8px 0;
            font-size: 14px;
        }
        .controls-hint i {
            color: #FFD700;
            margin-right: 10px;
            width: 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #FF7F50, #4A90D9);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 127, 80, 0.4);
        }
        .journey-info {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .journey-bar {
            margin-top: 15px;
        }
        .journey-track {
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .journey-fill {
            height: 100%;
            background: linear-gradient(90deg, #4A90D9, #2ECC71);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .journey-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
            color: #AAA;
        }
        .success-overlay h2 { color: #2ECC71; }
        .gameover-overlay h2 { color: #E74C3C; }
        .bird-selector {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }
        .bird-option {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .bird-option:hover {
            background: rgba(255,255,255,0.2);
        }
        .bird-option.selected {
            border-color: #FFD700;
            background: rgba(255,215,0,0.2);
        }
        .bird-option canvas {
            display: block;
            margin: 0 auto 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1><i class="fas fa-feather-alt"></i> 候鸟迁徙记</h1>
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="gameCanvas" class="game-canvas" width="880" height="500"></canvas>
            
            <div class="hud">
                <div class="hud-item">
                    <i class="fas fa-trophy"></i> 距离: <span class="value" id="distance">0%</span>
                </div>
                <div class="hud-item">
                    <i class="fas fa-bolt"></i> 速度: <span class="value" id="speed">0</span> km/h
                </div>
                <div class="hud-item">
                    <i class="fas fa-clock"></i> 已飞行: <span class="value" id="flightTime">0:00</span>
                </div>
                <div class="hud-item">
                    <i class="fas fa-heart"></i> 生命: <span class="value" id="lives">3</span>
                </div>
            </div>

            <div class="energy-bar">
                <div class="energy-label">
                    <span><i class="fas fa-battery-three-quarters"></i> 体力值</span>
                    <span id="energyPercent">100%</span>
                </div>
                <div class="energy-track">
                    <div class="energy-fill" id="energyFill" style="width: 100%;"></div>
                </div>
            </div>

            <div class="altitude-bar">
                <div class="altitude-track">
                    <div class="altitude-fill" id="altitudeFill" style="height: 50%;"></div>
                </div>
                <span style="position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: white; font-size: 10px;">高度</span>
            </div>

            <!-- 开始界面 -->
            <div class="game-overlay" id="startOverlay">
                <h2><i class="fas fa-feather-alt"></i> 候鸟迁徙记</h2>
                <p>从北方飞往黄河湿地，完成艰难的迁徙之旅</p>
                
                <div class="journey-info">
                    <h4 style="color: #FFD700; margin-bottom: 10px;"><i class="fas fa-map-marked-alt"></i> 迁徙路线</h4>
                    <div class="journey-bar">
                        <div class="journey-track">
                            <div class="journey-fill" id="journeyPreview" style="width: 0%;"></div>
                        </div>
                        <div class="journey-labels">
                            <span><i class="fas fa-snowflake"></i> 北方</span>
                            <span><i class="fas fa-water"></i> 黄河湿地</span>
                        </div>
                    </div>
                </div>

                <h4 style="color: #FFD700; margin: 15px 0 10px;"><i class="fas fa-dove"></i> 选择候鸟</h4>
                <div class="bird-selector" id="birdSelector">
                    <!-- JS生成 -->
                </div>
                
                <div class="controls-hint">
                    <h4 style="margin-bottom: 10px; color: #FFD700;"><i class="fas fa-gamepad"></i> 游戏操作</h4>
                    <p><i class="fas fa-arrows-alt"></i> 方向键/鼠标 - 控制飞行方向</p>
                    <p><i class="fas fa-keyboard"></i> 空格键 - 加速冲刺（消耗体力）</p>
                    <p><i class="fas fa-exclamation-triangle"></i> 躲避障碍物，收集食物补充体力</p>
                </div>

                <button class="start-btn" onclick="migrationGame.start()">
                    <i class="fas fa-paper-plane"></i> 开始迁徙
                </button>
            </div>

            <!-- 游戏失败界面 -->
            <div class="game-overlay gameover-overlay" id="gameOverOverlay" style="display: none;">
                <h2><i class="fas fa-sad-tear"></i> 迁徙失败</h2>
                <p>候鸟在途中体力耗尽...</p>
                <div style="margin: 20px 0;">
                    <p><i class="fas fa-road"></i> 飞行距离: <span id="failDistance">0%</span></p>
                    <p><i class="fas fa-clock"></i> 存活时间: <span id="failTime">0:00</span></p>
                </div>
                <button class="start-btn" onclick="migrationGame.restart()">
                    <i class="fas fa-redo"></i> 重新迁徙
                </button>
            </div>

            <!-- 迁徙成功界面 -->
            <div class="game-overlay success-overlay" id="successOverlay" style="display: none;">
                <h2><i class="fas fa-trophy"></i> 迁徙成功!</h2>
                <p>恭喜候鸟平安抵达黄河湿地!</p>
                <div style="margin: 20px 0;">
                    <p><i class="fas fa-clock"></i> 用时: <span id="successTime">0:00</span></p>
                    <p><i class="fas fa-star"></i> 评级: <span id="successRating">0</span> 星</p>
                </div>
                <button class="start-btn" onclick="migrationGame.restart()">
                    <i class="fas fa-redo"></i> 再飞一次
                </button>
            </div>
        </div>
    </div>

    <script>
        // 候鸟类型配置
        const birdTypes = [
            {
                id: 'swan',
                name: '白天鹅',
                speed: 3,
                stamina: 100,
                agility: 4,
                color: '#FFFFFF',
                accent: '#FFD700'
            },
            {
                id: 'crane',
                name: '丹顶鹤',
                speed: 4,
                stamina: 80,
                agility: 5,
                color: '#F5F5F5',
                accent: '#E74C3C'
            },
            {
                id: 'goose',
                name: '大雁',
                speed: 5,
                stamina: 120,
                agility: 3,
                color: '#8B7355',
                accent: '#333'
            },
            {
                id: 'gull',
                name: '海鸥',
                speed: 4,
                stamina: 70,
                agility: 6,
                color: '#FFFFFF',
                accent: '#5F9EA0'
            }
        ];

        const migrationGame = {
            canvas: null,
            ctx: null,
            isRunning: false,
            gameTime: 0,
            frameCount: 0,
            journey: 0, // 0-100 迁徙进度
            
            bird: {
                x: 100,
                y: 250,
                vx: 0,
                vy: 0,
                type: birdTypes[0],
                energy: 100,
                maxEnergy: 100,
                wingFrame: 0,
                isBoosting: false,
                invincible: 0
            },
            
            obstacles: [],
            foods: [],
            particles: [],
            
            // 难度曲线
            difficulty: 1,
            lastObstacleTime: 0,
            
            init: function() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // 渲染鸟类选择器
                this.renderBirdSelector();
                
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    if (!this.isRunning) return;
                    
                    switch(e.code) {
                        case 'ArrowUp':
                        case 'KeyW':
                            this.bird.vy = -this.bird.type.agility;
                            break;
                        case 'ArrowDown':
                        case 'KeyS':
                            this.bird.vy = this.bird.type.agility;
                            break;
                        case 'ArrowLeft':
                        case 'KeyA':
                            this.bird.vx = -this.bird.type.speed;
                            break;
                        case 'ArrowRight':
                        case 'KeyD':
                            this.bird.vx = this.bird.type.speed;
                            break;
                        case 'Space':
                            e.preventDefault();
                            this.bird.isBoosting = true;
                            break;
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    if (e.code === 'Space') {
                        this.bird.isBoosting = false;
                    }
                });
                
                // 鼠标/触摸控制
                this.canvas.addEventListener('mousemove', (e) => {
                    if (!this.isRunning) return;
                    
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;
                    const mouseX = (e.clientX - rect.left) * scaleX;
                    const mouseY = (e.clientY - rect.top) * scaleY;
                    
                    // 鼠标引导飞行
                    const dx = mouseX - this.bird.x;
                    const dy = mouseY - this.bird.y;
                    this.bird.vx = Math.sign(dx) * Math.min(Math.abs(dx) * 0.05, this.bird.type.speed);
                    this.bird.vy = Math.sign(dy) * Math.min(Math.abs(dy) * 0.05, this.bird.type.agility);
                });
                
                this.canvas.addEventListener('click', (e) => {
                    if (this.isRunning) {
                        this.bird.isBoosting = true;
                        setTimeout(() => this.bird.isBoosting = false, 200);
                    }
                });
                
                // 开始游戏循环
                this.gameLoop();
            },
            
            renderBirdSelector: function() {
                const container = $('#birdSelector');
                container.empty();
                
                birdTypes.forEach((bird, index) => {
                    const selected = index === 0 ? 'selected' : '';
                    container.append(`
                        <div class="bird-option ${selected}" data-index="${index}" onclick="migrationGame.selectBird(${index})">
                            <canvas class="bird-preview" width="60" height="40" data-index="${index}"></canvas>
                            <div>${bird.name}</div>
                            <div style="font-size: 10px; opacity: 0.7;">
                                速度:${bird.speed} 体力:${bird.stamina}
                            </div>
                        </div>
                    `);
                });
                
                // 绘制预览
                setTimeout(() => {
                    birdTypes.forEach((bird, index) => {
                        const canvas = document.querySelector(`.bird-preview[data-index="${index}"]`);
                        if (canvas) {
                            this.drawBirdPreview(canvas, bird);
                        }
                    });
                }, 50);
            },
            
            drawBirdPreview: function(canvas, bird) {
                const ctx = canvas.getContext('2d');
                const scale = 0.6;
                
                ctx.fillStyle = bird.color;
                // 身体
                ctx.beginPath();
                ctx.ellipse(30, 20, 20 * scale, 10 * scale, 0, 0, Math.PI * 2);
                ctx.fill();
                // 头
                ctx.beginPath();
                ctx.arc(45, 15, 8 * scale, 0, Math.PI * 2);
                ctx.fill();
                // 装饰
                ctx.fillStyle = bird.accent;
                ctx.beginPath();
                ctx.arc(48, 10, 4 * scale, 0, Math.PI * 2);
                ctx.fill();
            },
            
            selectBird: function(index) {
                this.bird.type = birdTypes[index];
                this.bird.energy = this.bird.type.stamina;
                this.bird.maxEnergy = this.bird.type.stamina;
                
                $('.bird-option').removeClass('selected');
                $(`.bird-option[data-index="${index}"]`).addClass('selected');
            },
            
            start: function() {
                this.isRunning = true;
                this.journey = 0;
                this.gameTime = 0;
                this.difficulty = 1;
                
                this.bird = {
                    x: 100,
                    y: 250,
                    vx: this.bird.type.speed,
                    vy: 0,
                    type: this.bird.type,
                    energy: this.bird.type.stamina,
                    maxEnergy: this.bird.type.stamina,
                    wingFrame: 0,
                    isBoosting: false,
                    invincible: 0
                };
                
                this.obstacles = [];
                this.foods = [];
                this.particles = [];
                this.lastObstacleTime = 0;
                
                $('#startOverlay').hide();
            },
            
            restart: function() {
                $('#gameOverOverlay').hide();
                $('#successOverlay').hide();
                $('#startOverlay').show();
            },
            
            update: function() {
                if (!this.isRunning) return;
                
                this.frameCount++;
                this.gameTime = Math.floor((Date.now() - (this.gameStartTime || Date.now())) / 1000);
                
                // 更新鸟的位置
                if (this.bird.isBoosting && this.bird.energy > 0) {
                    this.bird.vx = this.bird.type.speed * 1.5;
                    this.bird.energy -= 0.5;
                    
                    // 冲刺粒子效果
                    if (this.frameCount % 3 === 0) {
                        this.particles.push({
                            x: this.bird.x - 20,
                            y: this.bird.y,
                            vx: -2,
                            vy: (Math.random() - 0.5) * 2,
                            life: 20,
                            color: '#87CEEB'
                        });
                    }
                } else {
                    this.bird.vx = this.bird.type.speed;
                }
                
                this.bird.x += this.bird.vx;
                this.bird.y += this.bird.vy;
                
                // 高度变化影响体力消耗
                const altitude = this.bird.y;
                if (altitude < 100 || altitude > 400) {
                    this.bird.energy -= 0.1;
                }
                
                // 自然体力恢复（在安全区域）
                if (altitude >= 150 && altitude <= 350 && !this.bird.isBoosting) {
                    this.bird.energy = Math.min(this.bird.maxEnergy, this.bird.energy + 0.05);
                }
                
                // 边界限制
                this.bird.y = Math.max(50, Math.min(this.canvas.height - 50, this.bird.y));
                
                // 无敌时间减少
                if (this.bird.invincible > 0) this.bird.invincible--;
                
                // 翅膀动画
                this.bird.wingFrame = (this.bird.wingFrame + 0.15) % 2;
                
                // 推进迁徙进度
                this.journey += 0.1 + (this.bird.isBoosting ? 0.15 : 0);
                
                // 增加难度
                this.difficulty = 1 + this.journey * 0.02;
                
                // 生成障碍物
                if (this.frameCount - this.lastObstacleTime > 60 / this.difficulty) {
                    this.spawnObstacle();
                    this.lastObstacleTime = this.frameCount;
                }
                
                // 生成食物
                if (this.frameCount % 30 === 0) {
                    this.spawnFood();
                }
                
                // 更新障碍物
                this.obstacles = this.obstacles.filter(obs => {
                    obs.x -= obs.speed;
                    
                    // 碰撞检测
                    if (this.checkCollision(this.bird, obs)) {
                        if (this.bird.invincible <= 0) {
                            this.bird.energy -= obs.damage;
                            this.bird.invincible = 60;
                            this.createHitEffect(this.bird.x, this.bird.y);
                            
                            if (this.bird.energy <= 0) {
                                this.gameOver();
                            }
                        }
                        return false;
                    }
                    
                    return obs.x > -obs.width;
                });
                
                // 更新食物
                this.foods = this.foods.filter(food => {
                    food.x -= food.speed;
                    food.y += Math.sin(this.frameCount * 0.1 + food.offset) * 0.5;
                    
                    // 收集检测
                    const dist = Math.hypot(this.bird.x - food.x, this.bird.y - food.y);
                    if (dist < 30) {
                        this.bird.energy = Math.min(this.bird.maxEnergy, this.bird.energy + food.energy);
                        this.createCollectEffect(food.x, food.y);
                        return false;
                    }
                    
                    return food.x > -20;
                });
                
                // 更新粒子
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });
                
                // 更新UI
                this.updateUI();
                
                // 检查胜利
                if (this.journey >= 100) {
                    this.victory();
                }
            },
            
            spawnObstacle: function() {
                const types = [
                    { type: 'windmill', width: 40, height: 150, damage: 20, speed: 3, y: 'random' },
                    { type: 'building', width: 60, height: 200, damage: 15, speed: 4, y: 'bottom' },
                    { type: 'hunter', width: 30, height: 30, damage: 30, speed: 5, y: 'random' },
                    { type: 'net', width: 100, height: 80, damage: 25, speed: 2, y: 'random' }
                ];
                
                const obsType = types[Math.floor(Math.random() * types.length)];
                const y = obsType.y === 'random' 
                    ? 100 + Math.random() * 300
                    : obsType.y === 'bottom' 
                        ? this.canvas.height - obsType.height
                        : 200;
                
                this.obstacles.push({
                    ...obsType,
                    x: this.canvas.width + 50,
                    y: y,
                    rotation: 0
                });
            },
            
            spawnFood: function() {
                const types = [
                    { type: 'fish', energy: 15, color: '#FFA500' },
                    { type: 'insect', energy: 8, color: '#8B4513' },
                    { type: 'berry', energy: 10, color: '#9932CC' }
                ];
                
                const foodType = types[Math.floor(Math.random() * types.length)];
                
                this.foods.push({
                    ...foodType,
                    x: this.canvas.width + 20,
                    y: 100 + Math.random() * 300,
                    speed: 2 + this.difficulty,
                    offset: Math.random() * Math.PI * 2
                });
            },
            
            checkCollision: function(bird, obs) {
                const birdLeft = bird.x - 15;
                const birdRight = bird.x + 15;
                const birdTop = bird.y - 10;
                const birdBottom = bird.y + 10;
                
                return birdRight > obs.x && 
                       birdLeft < obs.x + obs.width &&
                       birdBottom > obs.y && 
                       birdTop < obs.y + obs.height;
            },
            
            createHitEffect: function(x, y) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 30,
                        color: '#E74C3C'
                    });
                }
            },
            
            createCollectEffect: function(x, y) {
                for (let i = 0; i < 5; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: -Math.random() * 3,
                        life: 20,
                        color: '#2ECC71'
                    });
                }
            },
            
            updateUI: function() {
                const energyPercent = Math.max(0, this.bird.energy / this.bird.maxEnergy * 100);
                const altitudePercent = this.bird.y / this.canvas.height * 100;
                const minutes = Math.floor(this.gameTime / 60);
                const seconds = this.gameTime % 60;
                
                $('#distance').text(Math.floor(this.journey) + '%');
                $('#speed').text(Math.floor(this.bird.vx * 20));
                $('#flightTime').text(`${minutes}:${seconds.toString().padStart(2, '0')}`);
                $('#lives').text(this.bird.invincible > 0 ? '∞' : '1');
                $('#energyPercent').text(Math.floor(energyPercent) + '%');
                $('#energyFill').css('width', energyPercent + '%');
                $('#altitudeFill').css('height', altitudePercent + '%');
            },
            
            gameOver: function() {
                this.isRunning = false;
                const minutes = Math.floor(this.gameTime / 60);
                const seconds = this.gameTime % 60;
                
                $('#failDistance').text(Math.floor(this.journey) + '%');
                $('#failTime').text(`${minutes}:${seconds.toString().padStart(2, '0')}`);
                $('#gameOverOverlay').show();
            },
            
            victory: function() {
                this.isRunning = false;
                const minutes = Math.floor(this.gameTime / 60);
                const seconds = this.gameTime % 60;
                
                $('#successTime').text(`${minutes}:${seconds.toString().padStart(2, '0')}`);
                
                // 根据时间计算星级
                let stars = 3;
                if (this.gameTime > 60) stars = 2;
                if (this.gameTime > 90) stars = 1;
                $('#successRating').text('★'.repeat(stars));
                
                $('#successOverlay').show();
            },
            
            draw: function() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制天空渐变（根据进度变化）
                const skyProgress = this.journey / 100;
                const skyGradient = ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                
                if (skyProgress < 0.3) {
                    // 北方寒冷天空
                    skyGradient.addColorStop(0, '#87CEEB');
                    skyGradient.addColorStop(1, '#B0C4DE');
                } else if (skyProgress < 0.7) {
                    // 中途
                    skyGradient.addColorStop(0, '#FF7F50');
                    skyGradient.addColorStop(0.5, '#FFB6C1');
                    skyGradient.addColorStop(1, '#87CEEB');
                } else {
                    // 接近目的地
                    skyGradient.addColorStop(0, '#87CEEB');
                    skyGradient.addColorStop(1, '#20B2AA');
                }
                ctx.fillStyle = skyGradient;
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制云朵
                this.drawClouds();
                
                // 绘制远景
                this.drawBackground();
                
                // 绘制食物
                this.foods.forEach(f => this.drawFood(f));
                
                // 绘制障碍物
                this.obstacles.forEach(obs => this.drawObstacle(obs));
                
                // 绘制粒子
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life / 30;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
                
                // 绘制候鸟
                this.drawBird();
                
                // 绘制进度条
                this.drawProgressBar();
            },
            
            drawClouds: function() {
                const ctx = this.ctx;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                
                for (let i = 0; i < 5; i++) {
                    const x = (i * 200 + this.frameCount * 0.5) % (this.canvas.width + 200) - 100;
                    const y = 50 + i * 30;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.arc(x + 25, y - 10, 30, 0, Math.PI * 2);
                    ctx.arc(x + 50, y, 25, 0, Math.PI * 2);
                    ctx.fill();
                }
            },
            
            drawBackground: function() {
                const ctx = this.ctx;
                const progress = this.journey / 100;
                
                // 根据进度绘制不同背景元素
                if (progress < 0.3) {
                    // 北方雪景
                    ctx.fillStyle = '#FFF';
                    for (let i = 0; i < 10; i++) {
                        ctx.beginPath();
                        ctx.arc(
                            (i * 100 + this.frameCount * 0.3) % (this.canvas.width + 50) - 25,
                            this.canvas.height - 20,
                            5,
                            0, Math.PI * 2
                        );
                        ctx.fill();
                    }
                } else if (progress < 0.7) {
                    // 城市/郊区
                    ctx.fillStyle = '#696969';
                    for (let i = 0; i < 4; i++) {
                        const x = (i * 250 + this.frameCount * 0.5) % (this.canvas.width + 100) - 50;
                        ctx.fillRect(x, this.canvas.height - 100, 60, 80);
                        ctx.fillRect(x + 10, this.canvas.height - 130, 20, 30);
                    }
                } else {
                    // 黄河湿地
                    ctx.fillStyle = '#3A7D44';
                    ctx.fillRect(0, this.canvas.height - 50, this.canvas.width, 50);
                    ctx.fillStyle = '#20B2AA';
                    ctx.fillRect(0, this.canvas.height - 30, this.canvas.width, 30);
                }
            },
            
            drawBird: function() {
                const ctx = this.ctx;
                const b = this.bird;
                
                ctx.save();
                ctx.translate(b.x, b.y);
                
                // 无敌闪烁
                if (b.invincible > 0 && Math.floor(b.invincible / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 冲刺特效
                if (b.isBoosting) {
                    ctx.fillStyle = 'rgba(135, 206, 235, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(-30, 0);
                    ctx.lineTo(-60, -10);
                    ctx.lineTo(-60, 10);
                    ctx.closePath();
                    ctx.fill();
                }
                
                const birdColor = b.type.color;
                const accent = b.type.accent;
                
                // 身体
                ctx.fillStyle = birdColor;
                ctx.beginPath();
                ctx.ellipse(0, 0, 20, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 翅膀动画
                const wingAngle = Math.sin(b.wingFrame * Math.PI) * 0.4;
                ctx.fillStyle = b.isBoosting ? accent : birdColor;
                ctx.save();
                ctx.translate(-5, 0);
                ctx.rotate(wingAngle);
                ctx.beginPath();
                ctx.ellipse(0, -12, 15, 8, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // 尾巴
                ctx.fillStyle = birdColor;
                ctx.beginPath();
                ctx.moveTo(-15, 0);
                ctx.lineTo(-30, -5);
                ctx.lineTo(-25, 0);
                ctx.lineTo(-30, 5);
                ctx.closePath();
                ctx.fill();
                
                // 头
                ctx.fillStyle = birdColor;
                ctx.beginPath();
                ctx.arc(15, -3, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(18, -4, 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 嘴巴
                ctx.fillStyle = accent;
                ctx.beginPath();
                ctx.moveTo(22, -3);
                ctx.lineTo(30, -1);
                ctx.lineTo(22, 1);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            },
            
            drawObstacle: function(obs) {
                const ctx = this.ctx;
                
                ctx.save();
                ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);
                
                if (obs.type === 'windmill') {
                    // 风力发电机
                    ctx.fillStyle = '#DDD';
                    ctx.fillRect(-5, -obs.height/2, 10, obs.height);
                    
                    ctx.strokeStyle = '#AAA';
                    ctx.lineWidth = 3;
                    for (let i = 0; i < 3; i++) {
                        ctx.save();
                        ctx.rotate((this.frameCount * 0.1) + i * Math.PI * 2 / 3);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(0, -50);
                        ctx.lineTo(10, -45);
                        ctx.lineTo(0, 0);
                        ctx.fillStyle = '#EEE';
                        ctx.fill();
                        ctx.restore();
                    }
                } else if (obs.type === 'building') {
                    // 建筑
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                    ctx.fillStyle = '#FFD700';
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 4; j++) {
                            ctx.fillRect(-25 + i * 18, -80 + j * 20, 10, 15);
                        }
                    }
                } else if (obs.type === 'hunter') {
                    // 猎人
                    obs.rotation += 0.05;
                    ctx.fillStyle = '#8B0000';
                    ctx.fillRect(-3, -20, 6, 20);
                    ctx.fillStyle = '#FFE4C4';
                    ctx.beginPath();
                    ctx.arc(0, -25, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(0, -40, 12, Math.PI, 0);
                    ctx.fill();
                } else if (obs.type === 'net') {
                    // 渔网
                    ctx.strokeStyle = '#8B7355';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(-obs.width/2, -obs.height/2 + i * 20);
                        ctx.lineTo(obs.width/2, -obs.height/2 + i * 20 + 10);
                        ctx.stroke();
                    }
                    for (let i = 0; i < 6; i++) {
                        ctx.beginPath();
                        ctx.moveTo(-obs.width/2 + i * 20, -obs.height/2);
                        ctx.lineTo(-obs.width/2 + i * 20 + 10, obs.height/2);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            },
            
            drawFood: function(food) {
                const ctx = this.ctx;
                
                ctx.save();
                ctx.translate(food.x, food.y);
                
                if (food.type === 'fish') {
                    ctx.fillStyle = food.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 12, 6, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(-10, 0);
                    ctx.lineTo(-18, -6);
                    ctx.lineTo(-18, 6);
                    ctx.closePath();
                    ctx.fill();
                } else if (food.type === 'insect') {
                    ctx.fillStyle = food.color;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 6, 4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 4; i++) {
                        const angle = (i * 90 + this.frameCount * 10) * Math.PI / 180;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * 8, Math.sin(angle) * 8);
                        ctx.stroke();
                    }
                } else {
                    ctx.fillStyle = food.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 发光效果
                ctx.shadowColor = food.color;
                ctx.shadowBlur = 10;
                
                ctx.restore();
            },
            
            drawProgressBar: function() {
                const ctx = this.ctx;
                const y = this.canvas.height - 30;
                
                // 背景
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(50, y, this.canvas.width - 100, 15);
                
                // 进度
                const gradient = ctx.createLinearGradient(50, 0, this.canvas.width - 50, 0);
                gradient.addColorStop(0, '#4A90D9');
                gradient.addColorStop(1, '#2ECC71');
                ctx.fillStyle = gradient;
                ctx.fillRect(50, y, (this.canvas.width - 100) * this.journey / 100, 15);
                
                // 鸟类位置标记
                const birdMarkerX = 50 + (this.canvas.width - 100) * this.journey / 100;
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.moveTo(birdMarkerX, y - 5);
                ctx.lineTo(birdMarkerX - 5, y - 12);
                ctx.lineTo(birdMarkerX + 5, y - 12);
                ctx.closePath();
                ctx.fill();
                
                // 标签
                ctx.font = '10px sans-serif';
                ctx.fillStyle = '#FFF';
                ctx.textAlign = 'left';
                ctx.fillText('北方', 50, y + 30);
                ctx.textAlign = 'right';
                ctx.fillText('黄河湿地', this.canvas.width - 50, y + 30);
            },
            
            gameLoop: function() {
                if (this.isRunning && !this.gameStartTime) {
                    this.gameStartTime = Date.now();
                }
                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        };

        // 初始化游戏
        migrationGame.init();
    </script>
</body>
</html>
