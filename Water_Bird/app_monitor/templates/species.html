<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄河物种百科 | 生态方舟</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0EBFA7;
            --dark: #0a2e38;
            --card-bg: rgba(255,255,255,0.97);
            --text: #1a2a3a;
            --muted: #7a8fa6;
            --danger: #e74c3c;
            --warn: #f39c12;
            --safe: #27ae60;
            --bg-dark: #0a2e38;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a2e38 0%, #0c4a5e 50%, #0EBFA7 100%);
            min-height: 100vh;
            color: var(--text);
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: rgba(10,46,56,0.97);
            backdrop-filter: blur(20px);
            padding: 0 24px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            color: white; text-decoration: none; font-size: 18px; font-weight: 700;
        }
        .navbar-brand .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), #3498db);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a {
            color: rgba(255,255,255,0.75); text-decoration: none;
            padding: 6px 12px; border-radius: 8px; font-size: 13px; transition: all 0.2s;
        }
        .nav-links a:hover { background: rgba(14,191,167,0.2); color: var(--primary); }
        .nav-links a.active { color: var(--primary); background: rgba(14,191,167,0.15); }

        /* ===== 页面头部 ===== */
        .page-header {
            margin-top: 60px;
            padding: 48px 24px 36px;
            text-align: center; color: white;
        }
        .page-header h1 { font-size: 36px; font-weight: 800; margin-bottom: 10px; letter-spacing: 2px; }
        .page-header h1 i { margin-right: 10px; color: var(--primary); }
        .page-header p { font-size: 15px; color: rgba(255,255,255,0.6); max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .stats-bar {
            display: flex; justify-content: center; gap: 20px; margin-top: 24px; flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 14px 24px; text-align: center;
            backdrop-filter: blur(10px); min-width: 110px; transition: all 0.2s;
        }
        .stat-item:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }
        .stat-item .num { font-size: 28px; font-weight: 900; line-height: 1; }
        .stat-item .label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .stat-item .num.safe { color: #27ae60; }
        .stat-item .num.danger { color: #e74c3c; }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            max-width: 1100px; margin: 0 auto 24px; padding: 0 24px;
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .filter-bar input[type="text"] {
            flex: 1; min-width: 200px; padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            background: rgba(255,255,255,0.1); color: white; font-size: 14px; outline: none; transition: 0.2s;
        }
        .filter-bar input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }
        .filter-bar input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(14,191,167,0.2); }
        .filter-btn {
            padding: 9px 16px; border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px; background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.65); cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.14); color: white; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 4px 14px rgba(14,191,167,0.35); }

        /* ===== 物种卡片网格 ===== */
        .species-grid {
            max-width: 1200px; margin: 0 auto; padding: 0 24px 60px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px;
        }
        .species-card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            cursor: pointer; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }
        .species-card:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(14,191,167,0.3); }

        /* 卡片封面图 */
        .card-img {
            width: 100%; height: 170px; position: relative; overflow: hidden;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .species-card:hover .card-img img { transform: scale(1.06); }
        .card-img .card-bg {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center; font-size: 64px;
            color: rgba(255,255,255,0.25);
        }
        .card-img .species-emoji { font-size: 72px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }

        /* 保护等级角标 */
        .protection-badge {
            position: absolute; top: 10px; right: 10px;
            padding: 4px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .protection-badge.level-1 { background: #e74c3c; color: white; }
        .protection-badge.level-2 { background: #f39c12; color: white; }
        .protection-badge.level-3 { background: #27ae60; color: white; }
        .protection-badge.none { background: rgba(255,255,255,0.4); color: white; }

        /* IUCN 角标 */
        .iucn-badge {
            position: absolute; top: 10px; left: 10px;
            padding: 3px 8px; border-radius: 8px;
            font-size: 10px; font-weight: 800;
            color: white; letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 观测数标签 */
        .obs-count-badge {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            color: white; padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700;
            display: flex; align-items: center; gap: 4px;
        }

        .card-body { padding: 14px 16px; }
        .card-body h3 { font-size: 17px; font-weight: 800; color: var(--dark); margin-bottom: 3px; }
        .card-body .latin { font-style: italic; color: var(--muted); font-size: 12px; margin-bottom: 8px; }
        .card-body .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .meta-tag { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .meta-tag.order { background: #e8f8f5; color: #16a085; }
        .meta-tag.family { background: #fef9e7; color: #d68910; }
        .card-body .habit-snippet {
            font-size: 12px; color: var(--muted); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-footer {
            padding: 8px 16px 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid #f0f0f0;
        }
        .card-footer .obs-info {
            font-size: 11px; color: #bbb; display: flex; align-items: center; gap: 4px;
        }
        .card-footer .detail-link { color: var(--primary); font-size: 12px; font-weight: 700; }

        /* ===== 详情弹窗 ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; align-items: center;
            justify-content: center; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: 20px;
            max-width: 740px; width: 100%; max-height: 90vh;
            overflow-y: auto; box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            transform: translateY(20px); transition: transform 0.3s;
        }
        .modal-overlay.show .modal { transform: translateY(0); }

        .modal-hero {
            height: 220px; position: relative; overflow: hidden;
        }
        .modal-hero img { width: 100%; height: 100%; object-fit: cover; }
        .modal-hero .hero-bg {
            width: 100%; height: 100%; display: flex;
            align-items: center; justify-content: center; font-size: 100px;
            color: rgba(255,255,255,0.2);
        }
        .modal-hero .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
            display: flex; align-items: flex-end; padding: 20px;
        }
        .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .hero-badge {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
            color: white; backdrop-filter: blur(4px);
        }
        .modal-close-btn {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.4); border: none; color: white;
            font-size: 18px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: background 0.2s;
        }
        .modal-close-btn:hover { background: rgba(0,0,0,0.6); }

        .modal-body { padding: 24px; }
        .modal-name-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
        .modal-name-row h2 { font-size: 26px; font-weight: 900; color: var(--dark); line-height: 1.2; }
        .modal-name-row .latin { font-style: italic; color: var(--muted); font-size: 14px; margin-bottom: 16px; }

        /* 数据指标卡 */
        .modal-stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
        }
        .modal-stat-card {
            background: #f8f9fa; border-radius: 12px; padding: 12px;
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
        }
        .modal-stat-card .s-num { font-size: 20px; font-weight: 900; color: var(--dark); line-height: 1; }
        .modal-stat-card .s-lbl { font-size: 10px; color: #aaa; margin-top: 3px; }

        /* 分类学信息 */
        .modal-section { margin-bottom: 20px; }
        .modal-section-title {
            font-size: 12px; font-weight: 800; color: #aaa;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
        }
        .modal-section-title i { color: var(--primary); }
        .taxonomy-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .taxonomy-item {
            background: #f8f9fa; border-radius: 10px; padding: 10px 14px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .taxonomy-item .t-lbl { font-size: 10px; color: #bbb; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .taxonomy-item .t-val { font-size: 14px; font-weight: 700; color: var(--dark); }

        /* IUCN 状态卡 */
        .iucn-card {
            background: #f8f9fa; border-radius: 12px; padding: 14px;
            border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 14px;
        }
        .iucn-code {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: white; flex-shrink: 0;
        }
        .iucn-info .iucn-label { font-size: 16px; font-weight: 800; color: var(--dark); }
        .iucn-info .iucn-desc { font-size: 12px; color: #888; margin-top: 3px; }
        .iucn-info .iucn-bar {
            height: 4px; background: rgba(0,0,0,0.06); border-radius: 2px;
            margin-top: 6px; overflow: hidden; width: 120px;
        }
        .iucn-info .iucn-bar-fill { height: 100%; border-radius: 2px; }

        /* 分布与习性 */
        .habit-text {
            background: #f0fdfb; border-left: 4px solid var(--primary);
            border-radius: 0 12px 12px 0; padding: 14px 16px;
            font-size: 14px; line-height: 1.8; color: #334155;
        }

        /* 相关文章物种 */
        .related-species-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .related-species-card {
            background: #f8f9fa; border-radius: 12px; padding: 12px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent; display: flex; align-items: center; gap: 10px;
        }
        .related-species-card:hover { border-color: var(--primary); background: #f0fdfb; transform: translateY(-2px); }
        .related-species-card .rs-emoji { font-size: 36px; }
        .related-species-card .rs-name { font-size: 14px; font-weight: 700; color: var(--dark); }
        .related-species-card .rs-latin { font-size: 11px; color: #aaa; font-style: italic; }
        .related-species-card .rs-level {
            margin-left: auto; padding: 2px 8px; border-radius: 10px;
            font-size: 10px; font-weight: 700; color: white;
        }

        /* 快捷操作 */
        .modal-actions {
            display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px;
        }
        .modal-action-btn {
            flex: 1; min-width: 140px; padding: 11px 16px;
            border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); border: none; cursor: pointer;
        }
        .modal-action-btn.articles {
            background: linear-gradient(135deg, #9B59B6, #7d3c98); color: white;
            box-shadow: 0 4px 14px rgba(155,89,182,0.3);
        }
        .modal-action-btn.observations {
            background: linear-gradient(135deg, #3498DB, #2980B9); color: white;
            box-shadow: 0 4px 14px rgba(52,152,219,0.3);
        }
        .modal-action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        /* ===== 空状态 ===== */
        .empty-state { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.4); }
        .empty-state i { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: rgba(255,255,255,0.7); }

        /* ===== 骨架屏 ===== */
        .skeleton-card { background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; animation: pulse 1.5s infinite; }
        .skeleton-img { height: 170px; background: rgba(255,255,255,0.1); }
        .skeleton-body { padding: 14px 16px; }
        .skeleton-line { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; margin-bottom: 8px; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* ===== Toast ===== */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1a2a3a; color: white; padding: 12px 20px;
            border-radius: 10px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 9999; transform: translateY(100px); opacity: 0; transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        @media (max-width: 640px) {
            .modal-stats-grid { grid-template-columns: 1fr 1fr; }
            .taxonomy-grid { grid-template-columns: 1fr 1fr; }
            .related-species-grid { grid-template-columns: 1fr; }
            .species-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="logo"><i class="fas fa-feather" style="color:white"></i></div>
        黄河生态方舟
    </a>
    <div class="nav-links">
        <a href="/"><i class="fas fa-map-marked-alt"></i> 大屏</a>
        <a href="/report/"><i class="fas fa-camera"></i> 上报</a>
        <a href="/species/" class="active"><i class="fas fa-book"></i> 物种百科</a>
        <a href="/articles/"><i class="fas fa-newspaper"></i> 科普</a>
        <a href="/profile/"><i class="fas fa-user"></i> 个人</a>
    </div>
</nav>

<div class="page-header">
    <h1><i class="fas fa-feather-alt"></i>黄河湿地物种百科</h1>
    <p>收录黄河湿地代表性鸟类，基于实地监测数据整理，为您呈现黄河生态的多样面貌。</p>
    <div class="stats-bar">
        <div class="stat-item">
            <div class="num" id="totalCount">--</div>
            <div class="label">收录物种</div>
        </div>
        <div class="stat-item">
            <div class="num danger" id="protectedCount">--</div>
            <div class="label">受保护物种</div>
        </div>
        <div class="stat-item">
            <div class="num safe" id="obsCount">--</div>
            <div class="label">总观测次数</div>
        </div>
        <div class="stat-item">
            <div class="num" id="articleCount">--</div>
            <div class="label">科普文章</div>
        </div>
    </div>
</div>

<div class="filter-bar">
    <input type="text" id="searchInput" placeholder="搜索物种名称、目、科..." oninput="filterSpecies()">
    <button class="filter-btn active" onclick="setFilter(this, '全部')">全部</button>
    <button class="filter-btn" onclick="setFilter(this, '国家一级')">国家一级</button>
    <button class="filter-btn" onclick="setFilter(this, '国家二级')">国家二级</button>
    <button class="filter-btn" onclick="setFilter(this, '三有动物')">三有动物</button>
    <button class="filter-btn" onclick="setFilter(this, '无保护')">无保护</button>
</div>

<div class="species-grid" id="speciesGrid"></div>
<div class="empty-state" id="emptyState" style="display:none">
    <i class="fas fa-search"></i>
    <h3>没有找到匹配物种</h3>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-hero" id="modalHero">
            <div class="hero-bg" id="modalHeroBg">🦅</div>
            <img id="modalHeroImg" src="" alt="" style="display:none">
            <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div class="hero-overlay">
                <div class="hero-badges">
                    <span class="hero-badge" id="modalBadge" style="background:#e74c3c">国家一级</span>
                    <span class="hero-badge" id="modalIucnBadge" style="background:#27ae60">LC 无危</span>
                </div>
            </div>
        </div>
        <div class="modal-body">
            <div class="modal-name-row">
                <h2 id="modalName">--</h2>
            </div>
            <div class="latin" id="modalLatin">--</div>

            <!-- 数据指标 -->
            <div class="modal-stats-grid">
                <div class="modal-stat-card">
                    <div class="s-num" id="modalObsCount">--</div>
                    <div class="s-lbl">观测次数</div>
                </div>
                <div class="modal-stat-card">
                    <div class="s-num" id="modalObsDate">--</div>
                    <div class="s-lbl">最新观测</div>
                </div>
                <div class="modal-stat-card">
                    <div class="s-num" id="modalArticleCount">--</div>
                    <div class="s-lbl">相关文章</div>
                </div>
                <div class="modal-stat-card">
                    <div class="s-num" id="modalIucnCode">--</div>
                    <div class="s-lbl">IUCN等级</div>
                </div>
            </div>

            <!-- 分类学 -->
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-paw"></i> 分类学信息</div>
                <div class="taxonomy-grid">
                    <div class="taxonomy-item">
                        <div class="t-lbl">中文名</div>
                        <div class="t-val" id="modalNameCn">--</div>
                    </div>
                    <div class="taxonomy-item">
                        <div class="t-lbl">保护级别</div>
                        <div class="t-val" id="modalLevel">--</div>
                    </div>
                    <div class="taxonomy-item">
                        <div class="t-lbl">目</div>
                        <div class="t-val" id="modalOrder">--</div>
                    </div>
                    <div class="taxonomy-item">
                        <div class="t-lbl">科</div>
                        <div class="t-val" id="modalFamily">--</div>
                    </div>
                </div>
            </div>

            <!-- IUCN 状态 -->
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-globe-asia"></i> IUCN 濒危等级</div>
                <div class="iucn-card">
                    <div class="iucn-code" id="modalIucnCodeBox">--</div>
                    <div class="iucn-info">
                        <div class="iucn-label" id="modalIucnLabel">--</div>
                        <div class="iucn-desc" id="modalIucnDesc">--</div>
                        <div class="iucn-bar"><div class="iucn-bar-fill" id="modalIucnBar"></div></div>
                    </div>
                </div>
            </div>

            <!-- 分布与习性 -->
            <div class="modal-section">
                <div class="modal-section-title"><i class="fas fa-leaf"></i> 分布与习性</div>
                <div class="habit-text" id="modalHabit">--</div>
            </div>

            <!-- 同科物种 -->
            <div class="modal-section" id="relatedSection" style="display:none">
                <div class="modal-section-title"><i class="fas fa-users"></i> 同科物种</div>
                <div class="related-species-grid" id="relatedGrid"></div>
            </div>

            <!-- 快捷操作 -->
            <div class="modal-actions">
                <a id="modalLinkArticles" href="/articles/" class="modal-action-btn articles" target="_blank">
                    <i class="fas fa-newspaper"></i> 相关科普文章
                </a>
                <a id="modalLinkReport" href="/report/" class="modal-action-btn observations" target="_blank">
                    <i class="fas fa-camera"></i> 上报该物种观测
                </a>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let allSpecies = [];
let currentFilter = '全部';
let searchKeyword = '';

const EMOJIS = {
    '鹰': '🦅', '鹗': '🦅', '隼': '🦅', '鹞': '🦅', '鸮': '🦅', '鸺': '🦅',
    '雁': '🦆', '鸭': '🦆', '天鹅': '🦢', '鹤': '🦢', '雁': '🦆',
    '鹭': '🦅', '鹈': '🦅', '鸊': '🦆', '鸬': '🦅', '鹲': '🦅',
    '燕': '🐦', '鸥': '🦆', '鳾': '🐦', '鸦': '🐦', '鹛': '🐦',
    '喜鹊': '🐦', '麻雀': '🐦', '山雀': '🐦', '鸱': '🦅',
    'default': '🐦'
};

function getEmoji(name) {
    if (!name) return EMOJIS['default'];
    for (const [k, v] of Object.entries(EMOJIS)) {
        if (name.includes(k)) return v;
    }
    return EMOJIS['default'];
}

function getLevelClass(level) {
    if (!level) return 'none';
    if (level.includes('一级')) return 'level-1';
    if (level.includes('二级')) return 'level-2';
    if (level.includes('三有')) return 'level-3';
    return 'none';
}

function getLevelLabel(level) {
    if (!level || level === '无') return '无保护';
    return level;
}

function getLevelBg(level) {
    if (!level) return 'rgba(255,255,255,0.4)';
    if (level.includes('一级')) return '#e74c3c';
    if (level.includes('二级')) return '#f39c12';
    if (level.includes('三有')) return '#27ae60';
    return 'rgba(255,255,255,0.4)';
}

function emojiBg(name) {
    const palette = [
        'linear-gradient(135deg,#1a5a6e,#0EBFA7)',
        'linear-gradient(135deg,#0a3d62,#1abc9c)',
        'linear-gradient(135deg,#1e3799,#4a69bd)',
        'linear-gradient(135deg,#0c2461,#3c6382)',
        'linear-gradient(135deg,#6a1b4d,#a044ff)',
        'linear-gradient(135deg,#0a3d62,#60a3bc)',
    ];
    if (!name) return palette[0];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return palette[Math.abs(hash) % palette.length];
}

function renderCards(species) {
    const grid = document.getElementById('speciesGrid');
    const empty = document.getElementById('emptyState');
    if (species.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = species.map(s => {
        const obs = s.observation_count || 0;
        return `<div class="species-card" onclick="showDetail(${s.id})">
            <div class="card-img">
                <div class="card-bg" style="background:${emojiBg(s.name_cn)}">
                    <span class="species-emoji">${getEmoji(s.name_cn)}</span>
                </div>
                <span class="protection-badge ${getLevelClass(s.protection_level)}">${getLevelLabel(s.protection_level)}</span>
                ${s.iucn_status ? `<span class="iucn-badge" style="background:${s.iucn_status.color}">${s.iucn_status.code}</span>` : ''}
                ${obs > 0 ? `<span class="obs-count-badge"><i class="fas fa-eye"></i> ${obs}</span>` : ''}
            </div>
            <div class="card-body">
                <h3>${s.name_cn}</h3>
                <div class="latin">${s.name_latin || '—'}</div>
                <div class="meta">
                    ${s.order ? `<span class="meta-tag order"><i class="fas fa-folder"></i> ${s.order}</span>` : ''}
                    ${s.family ? `<span class="meta-tag family"><i class="fas fa-home"></i> ${s.family}</span>` : ''}
                </div>
                <div class="habit-snippet">${s.distribution_habit || '暂无分布与习性数据'}</div>
            </div>
            <div class="card-footer">
                <span class="obs-info"><i class="fas fa-clock"></i> ${s.last_observed || '暂无记录'}</span>
                <span class="detail-link">详情 <i class="fas fa-arrow-right"></i></span>
            </div>
        </div>`;
    }).join('');
}

function filterSpecies() {
    searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    applyFilters();
}

function setFilter(el, level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
}

function applyFilters() {
    let list = allSpecies;
    if (currentFilter === '国家一级') list = list.filter(s => s.protection_level && s.protection_level.includes('一级'));
    else if (currentFilter === '国家二级') list = list.filter(s => s.protection_level && s.protection_level.includes('二级'));
    else if (currentFilter === '三有动物') list = list.filter(s => s.protection_level && s.protection_level.includes('三有'));
    else if (currentFilter === '无保护') list = list.filter(s => !s.protection_level || s.protection_level === '无' || s.protection_level === '');

    if (searchKeyword) list = list.filter(s =>
        (s.name_cn && s.name_cn.toLowerCase().includes(searchKeyword)) ||
        (s.name_latin && s.name_latin.toLowerCase().includes(searchKeyword)) ||
        (s.order && s.order.toLowerCase().includes(searchKeyword)) ||
        (s.family && s.family.toLowerCase().includes(searchKeyword))
    );
    renderCards(list);
}

function showDetail(id) {
    const s = allSpecies.find(x => x.id === id);
    if (!s) return;

    // Hero 区域
    document.getElementById('modalHeroBg').textContent = getEmoji(s.name_cn);
    document.getElementById('modalHeroBg').style.background = emojiBg(s.name_cn);
    document.getElementById('modalHeroImg').style.display = 'none';

    // 徽章
    const lvlBg = getLevelBg(s.protection_level);
    document.getElementById('modalBadge').textContent = getLevelLabel(s.protection_level);
    document.getElementById('modalBadge').style.background = lvlBg;

    const iucn = s.iucn_status || { code: 'LC', label: '无危', color: '#27ae60', desc: '' };
    document.getElementById('modalIucnBadge').textContent = `${iucn.code} ${iucn.label}`;
    document.getElementById('modalIucnBadge').style.background = iucn.color;

    // 名称
    document.getElementById('modalName').textContent = s.name_cn;
    document.getElementById('modalLatin').textContent = s.name_latin || '—';
    document.getElementById('modalNameCn').textContent = s.name_cn;
    document.getElementById('modalLevel').textContent = getLevelLabel(s.protection_level) || '无';
    document.getElementById('modalOrder').textContent = s.order || '—';
    document.getElementById('modalFamily').textContent = s.family || '—';

    // 数据指标
    document.getElementById('modalObsCount').textContent = s.observation_count || 0;
    document.getElementById('modalObsDate').textContent = s.last_observed || '—';
    document.getElementById('modalArticleCount').textContent = s.article_count || 0;
    document.getElementById('modalIucnCode').textContent = iucn.code;

    // IUCN 状态卡
    document.getElementById('modalIucnCodeBox').textContent = iucn.code;
    document.getElementById('modalIucnCodeBox').style.background = iucn.color;
    document.getElementById('modalIucnLabel').textContent = iucn.label;
    document.getElementById('modalIucnDesc').textContent = iucn.desc;
    const riskMap = { 'EN': 80, 'VU': 55, 'NT': 30, 'LC': 10 };
    document.getElementById('modalIucnBar').style.width = (riskMap[iucn.code] || 10) + '%';
    document.getElementById('modalIucnBar').style.background = iucn.color;

    // 分布与习性
    document.getElementById('modalHabit').textContent = s.distribution_habit || '暂无详细分布与习性数据';

    // 同科物种
    const related = allSpecies.filter(x => x.family === s.family && x.id !== s.id).slice(0, 4);
    if (related.length) {
        document.getElementById('relatedGrid').innerHTML = related.map(r => `
            <div class="related-species-card" onclick="showDetail(${r.id})">
                <span class="rs-emoji">${getEmoji(r.name_cn)}</span>
                <div>
                    <div class="rs-name">${r.name_cn}</div>
                    <div class="rs-latin">${r.name_latin || '—'}</div>
                </div>
                <span class="rs-level" style="background:${getLevelBg(r.protection_level)}">${getLevelLabel(r.protection_level)}</span>
            </div>`).join('');
        document.getElementById('relatedSection').style.display = 'block';
    } else {
        document.getElementById('relatedSection').style.display = 'none';
    }

    // 快捷链接
    document.getElementById('modalLinkArticles').href = `/articles/?search=${encodeURIComponent(s.name_cn)}`;
    document.getElementById('modalLinkReport').href = `/report/?species=${encodeURIComponent(s.name_cn)}`;

    document.getElementById('detailModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget && !e.target.closest('.modal')) return;
    document.getElementById('detailModal').classList.remove('show');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function loadSpecies() {
    const grid = document.getElementById('speciesGrid');
    grid.innerHTML = Array.from({length: 8}, () => `
        <div class="skeleton-card">
            <div class="skeleton-img"></div>
            <div class="skeleton-body">
                <div class="skeleton-line" style="width:60%"></div>
                <div class="skeleton-line" style="width:40%"></div>
                <div class="skeleton-line" style="width:80%"></div>
            </div>
        </div>`).join('');

    try {
        const res = await fetch(`${API}/species/`);
        const data = await res.json();
        allSpecies = data.results || data;

        const total = allSpecies.length;
        const protected_ = allSpecies.filter(s => s.protection_level && s.protection_level !== '无' && s.protection_level !== '').length;
        const totalObs = allSpecies.reduce((sum, s) => sum + (s.observation_count || 0), 0);
        const totalArticles = allSpecies.reduce((sum, s) => sum + (s.article_count || 0), 0);

        document.getElementById('totalCount').textContent = total;
        document.getElementById('protectedCount').textContent = protected_;
        document.getElementById('obsCount').textContent = totalObs;
        document.getElementById('articleCount').textContent = totalArticles;

        renderCards(allSpecies);

        const params = new URLSearchParams(window.location.search);
        // 优先精确 ID 跳转，其次模糊搜索
        const autoId = params.get('id');
        const autoSearch = params.get('search');

        if (autoId) {
            // 精确跳转：直接打开对应 ID 的详情弹窗
            setTimeout(() => showDetail(parseInt(autoId)), 200);
        } else if (autoSearch) {
            document.getElementById('searchInput').value = autoSearch;
            filterSpecies();
            const tryOpen = (attempts) => {
                const cards = document.querySelectorAll('.species-card');
                if (cards.length > 0) { cards[0].click(); }
                else if (attempts > 0) setTimeout(() => tryOpen(attempts - 1), 200);
            };
            setTimeout(() => tryOpen(5), 300);
        }
    } catch (err) {
        grid.innerHTML = `<div class="empty-state">
            <i class="fas fa-wifi"></i>
            <h3>数据加载失败</h3>
            <p>请检查网络连接后刷新重试</p>
        </div>`;
    }
}

loadSpecies();
</script>
</body>
</html>
