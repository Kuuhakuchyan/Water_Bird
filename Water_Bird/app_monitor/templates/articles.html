<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科普文章 | 黄河生态方舟</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #9B59B6;
            --dark: #0a2e38;
            --card-bg: rgba(255,255,255,0.95);
            --text: #1a2a3a;
            --muted: #7a8fa6;
            --danger: #e74c3c;
            --warn: #f39c12;
            --safe: #27ae60;
            --habitat: #27AE60;
            --species: #e74c3c;
            --knowledge: #3498DB;
            --news: #f39c12;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a2e38 0%, #1a1a5e 50%, #7B2D8B 100%);
            min-height: 100vh;
            color: var(--text);
        }

        /* 阅读进度条 */
        #reading-progress {
            position: fixed; top: 0; left: 0; height: 3px;
            background: linear-gradient(90deg, #9B59B6, #e74c3c);
            width: 0%; z-index: 9999;
            transition: width 0.1s;
        }

        .navbar {
            background: rgba(10,46,56,0.97);
            backdrop-filter: blur(20px);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            color: white; text-decoration: none; font-size: 18px; font-weight: 700;
        }
        .navbar-brand .logo {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), #3498db);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .navbar-links { display: flex; gap: 6px; align-items: center; }
        .nav-btn {
            padding: 7px 14px; border-radius: 8px;
            color: rgba(255,255,255,0.8); text-decoration: none;
            font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-btn.active { background: rgba(155,89,182,0.4); color: white; }

        /* 页面头部 */
        .page-header {
            padding: 80px 24px 32px;
            text-align: center;
            color: white;
        }
        .page-header h1 {
            font-size: 32px; font-weight: 900; margin-bottom: 8px; letter-spacing: 2px;
        }
        .page-header h1 i { margin-right: 10px; }
        .page-header p { color: rgba(255,255,255,0.6); font-size: 14px; }

        /* 统计卡片行 */
        .stats-row {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 28px; padding: 0 16px;
        }
        .stat-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px; padding: 14px 20px;
            text-align: center; color: white; min-width: 100px;
            transition: all 0.2s; cursor: default;
        }
        .stat-card:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }
        .stat-card .num { font-size: 26px; font-weight: 900; line-height: 1; }
        .stat-card .lbl { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; letter-spacing: 0.3px; }
        .stat-card .dot {
            width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 6px;
        }

        /* 搜索框 */
        .search-bar {
            max-width: 560px; margin: 0 auto 24px; position: relative;
        }
        .search-bar input {
            width: 100%; padding: 14px 20px 14px 46px;
            border: none; border-radius: 14px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.4); }
        .search-bar input:focus {
            background: rgba(255,255,255,0.18);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(155,89,182,0.25);
        }
        .search-bar i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); }

        /* 分类标签 */
        .category-tabs {
            display: flex; gap: 8px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 32px;
        }
        .cat-tab {
            padding: 7px 18px; border-radius: 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.65); cursor: pointer;
            font-size: 13px; font-weight: 600; transition: all 0.2s;
        }
        .cat-tab:hover { background: rgba(255,255,255,0.16); color: white; }
        .cat-tab.active {
            background: var(--primary); border-color: var(--primary); color: white;
            box-shadow: 0 4px 14px rgba(155,89,182,0.4);
        }
        .cat-tab .cat-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }

        /* 文章列表容器 */
        .articles-container {
            max-width: 920px; margin: 0 auto; padding: 0 20px 60px;
        }
        .result-hint {
            text-align: center; color: rgba(255,255,255,0.45); font-size: 13px;
            margin-bottom: 16px;
        }
        .result-hint span { color: #e0a0f0; font-weight: 700; }

        /* 文章卡片：缩略图+内容 */
        .article-card {
            background: var(--card-bg);
            border-radius: 16px; overflow: hidden;
            margin-bottom: 16px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
        }
        .article-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 40px rgba(155,89,182,0.25);
        }
        .article-thumb {
            width: 200px; min-height: 160px; flex-shrink: 0;
            position: relative; overflow: hidden;
        }
        .article-thumb img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s;
        }
        .article-card:hover .article-thumb img { transform: scale(1.06); }
        .article-thumb .thumb-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 52px;
        }
        .article-thumb .cat-overlay {
            position: absolute; bottom: 10px; left: 10px;
        }
        .article-card-body {
            flex: 1; padding: 18px 20px;
            display: flex; flex-direction: column;
        }
        .article-card-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px; flex-wrap: wrap;
        }
        .article-cat-badge {
            padding: 3px 10px; border-radius: 10px;
            font-size: 11px; font-weight: 700; color: white;
        }
        .badge-habitat { background: linear-gradient(135deg, #27AE60, #1E8449); }
        .badge-species { background: linear-gradient(135deg, #e74c3c, #C0392B); }
        .badge-knowledge { background: linear-gradient(135deg, #3498DB, #2980B9); }
        .badge-news { background: linear-gradient(135deg, #f39c12, #d68910); }

        .article-date {
            font-size: 11px; color: #bbb; margin-left: auto;
        }
        .article-title {
            font-size: 17px; font-weight: 800; color: #1a3a4a;
            margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .article-summary {
            font-size: 13px; color: #666; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            flex: 1;
        }
        .article-footer {
            display: flex; align-items: center; gap: 12px;
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }
        .article-meta {
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; color: #bbb;
        }
        .article-meta i { font-size: 10px; }
        .article-meta.reads { color: #e74c3c; }
        .read-more {
            margin-left: auto; font-size: 12px;
            color: var(--primary); font-weight: 700;
            display: flex; align-items: center; gap: 4px;
        }
        .article-footer .read-time {
            background: #f5f0ff; color: var(--primary);
            padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600;
        }

        /* 骨架屏 */
        .skeleton-card {
            background: var(--card-bg); border-radius: 16px;
            overflow: hidden; margin-bottom: 16px;
            display: flex;
        }
        .skeleton-thumb { width: 200px; min-height: 160px; flex-shrink: 0; background: #eee; animation: shimmer 1.5s infinite; }
        .skeleton-body { flex: 1; padding: 18px 20px; }
        .skeleton-line { height: 12px; background: #eee; border-radius: 6px; margin-bottom: 10px; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
        .empty-state i { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; margin-bottom: 6px; color: rgba(255,255,255,0.6); }
        .empty-state p { font-size: 13px; }

        /* ===== 文章详情弹窗 ===== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
            z-index: 2000; display: none;
            justify-content: center; align-items: flex-start; padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }

        .modal-article {
            background: white; border-radius: 20px;
            width: 100%; max-width: 760px;
            margin: 20px auto;
            overflow: hidden;
            animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-cover {
            width: 100%; height: 280px; object-fit: cover;
            display: block;
        }
        .modal-cover.placeholder {
            background: linear-gradient(135deg, #1a1a5e, #7B2D8B);
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; color: rgba(255,255,255,0.2);
        }
        .modal-header {
            padding: 24px 28px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .modal-cat-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .modal-cat-badge {
            padding: 4px 12px; border-radius: 12px;
            font-size: 12px; font-weight: 700; color: white;
        }
        .modal-pub-info {
            display: flex; align-items: center; gap: 16px;
            font-size: 12px; color: #aaa; flex-wrap: wrap;
        }
        .modal-pub-info span { display: flex; align-items: center; gap: 4px; }
        .modal-title {
            font-size: 24px; font-weight: 900; color: #1a3a4a;
            line-height: 1.4; margin-bottom: 8px;
        }
        .modal-summary {
            font-size: 14px; color: #666; line-height: 1.7;
            border-left: 3px solid var(--primary);
            padding-left: 12px; margin-top: 10px;
        }
        .modal-content {
            padding: 24px 28px 20px;
            font-size: 15px; line-height: 1.9; color: #444;
            max-height: 60vh; overflow-y: auto;
        }
        .modal-content p { margin-bottom: 16px; }
        .modal-content img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        .modal-divider {
            height: 1px; background: #f0f0f0; margin: 8px 0;
        }
        .modal-tags {
            display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
        }
        .modal-tag {
            padding: 3px 10px; border-radius: 8px;
            background: #f5f0ff; color: var(--primary);
            font-size: 11px; font-weight: 600;
        }
        /* 相关文章 */
        .modal-related {
            padding: 0 28px 24px;
        }
        .modal-related-title {
            font-size: 13px; font-weight: 800; color: #aaa;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }
        .modal-related-title i { color: var(--primary); }
        .related-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .related-card {
            background: #f8f9fa; border-radius: 10px;
            padding: 12px; cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .related-card:hover {
            border-color: var(--primary);
            background: #f5f0ff;
            transform: translateY(-2px);
        }
        .related-card .r-title {
            font-size: 13px; font-weight: 700; color: #1a3a4a;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            line-height: 1.4; margin-bottom: 6px;
        }
        .related-card .r-meta { font-size: 11px; color: #bbb; }
        .modal-close-bar {
            padding: 14px 28px; border-top: 1px solid #f0f0f0;
            display: flex; justify-content: flex-end;
        }
        .btn-close-modal {
            padding: 10px 28px; border-radius: 10px;
            background: #f0f2f5; border: none;
            font-size: 13px; font-weight: 600; color: #555;
            cursor: pointer; transition: 0.2s;
        }
        .btn-close-modal:hover { background: #e0e0e0; }
        .modal-close-bar .btn-back {
            margin-right: auto; padding: 10px 18px;
            border-radius: 10px; background: none; border: 1px solid #ddd;
            font-size: 13px; font-weight: 600; color: #888;
            cursor: pointer; transition: 0.2s;
        }
        .modal-close-bar .btn-back:hover { background: #f5f5f5; }

        /* 响应式 */
        @media (max-width: 640px) {
            .article-card { flex-direction: column; }
            .article-thumb { width: 100%; min-height: 160px; }
            .related-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="reading-progress"></div>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="logo"><i class="fas fa-dragon" style="color:white"></i></div>
        黄河生态方舟
    </a>
    <div class="navbar-links">
        <a href="/" class="nav-btn">首页</a>
        <a href="/species/" class="nav-btn">物种百科</a>
        <a href="/articles/" class="nav-btn active">科普文章</a>
        <a href="/report/" class="nav-btn">上报</a>
    </div>
</nav>

<div class="page-header">
    <h1><i class="fas fa-newspaper"></i> 科普文章</h1>
    <p>黄河湿地生态知识 · 保护动态 · 物种故事</p>
</div>

<div class="stats-row">
    <div class="stat-card">
        <div class="dot" style="background:#9B59B6"></div>
        <div class="num" id="totalCount">—</div>
        <div class="lbl">全部文章</div>
    </div>
    <div class="stat-card">
        <div class="dot" style="background:#27AE60"></div>
        <div class="num" id="habitatCount">—</div>
        <div class="lbl">栖息地保护</div>
    </div>
    <div class="stat-card">
        <div class="dot" style="background:#e74c3c"></div>
        <div class="num" id="speciesCount">—</div>
        <div class="lbl">物种保护</div>
    </div>
    <div class="stat-card">
        <div class="dot" style="background:#3498DB"></div>
        <div class="num" id="knowledgeCount">—</div>
        <div class="lbl">生态知识</div>
    </div>
    <div class="stat-card">
        <div class="dot" style="background:#f39c12"></div>
        <div class="num" id="newsCount">—</div>
        <div class="lbl">保护动态</div>
    </div>
</div>

<div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="搜索文章标题、内容..." oninput="filterArticles()">
</div>

<div class="category-tabs">
    <div class="cat-tab active" data-cat="全部" onclick="setCategory(this)">
        <span class="cat-dot" style="background:#9B59B6"></span>全部
    </div>
    <div class="cat-tab" data-cat="habitat" onclick="setCategory(this)">
        <span class="cat-dot" style="background:#27AE60"></span>栖息地保护
    </div>
    <div class="cat-tab" data-cat="species" onclick="setCategory(this)">
        <span class="cat-dot" style="background:#e74c3c"></span>物种保护
    </div>
    <div class="cat-tab" data-cat="knowledge" onclick="setCategory(this)">
        <span class="cat-dot" style="background:#3498DB"></span>生态知识
    </div>
    <div class="cat-tab" data-cat="news" onclick="setCategory(this)">
        <span class="cat-dot" style="background:#f39c12"></span>保护动态
    </div>
</div>

<div class="articles-container">
    <div class="result-hint" id="resultHint" style="display:none">
        找到 <span id="resultCount">0</span> 篇相关文章
    </div>
    <div id="articlesGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none">
        <i class="fas fa-book-open"></i>
        <h3>未找到相关文章</h3>
        <p>换个关键词试试吧</p>
    </div>
</div>

<!-- 文章详情弹窗 -->
<div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
    <div class="modal-article" onclick="event.stopPropagation()">
        <img id="modal-cover" class="modal-cover" src="" alt="">
        <div class="modal-header">
            <div class="modal-cat-row">
                <span class="modal-cat-badge" id="modal-cat-badge">—</span>
                <div class="modal-pub-info">
                    <span><i class="fas fa-user"></i> <span id="modal-author">—</span></span>
                    <span><i class="fas fa-clock"></i> <span id="modal-readtime">—</span></span>
                    <span><i class="fas fa-eye"></i> <span id="modal-views">0</span> 阅读</span>
                    <span id="modal-date">—</span>
                </div>
            </div>
            <h1 class="modal-title" id="modal-title">—</h1>
            <div class="modal-summary" id="modal-summary"></div>
        </div>
        <div class="modal-tags" id="modal-tags"></div>
        <div class="modal-content" id="modal-content"></div>
        <div class="modal-related">
            <div class="modal-related-title"><i class="fas fa-feather-alt"></i> 相关推荐</div>
            <div class="related-grid" id="related-grid"></div>
        </div>
        <div class="modal-close-bar">
            <a id="modalLinkSpecies" href="/species/" class="btn-back" style="display:none" target="_blank">
                <i class="fas fa-book"></i> 查看相关物种
            </a>
            <button class="btn-back" onclick="closeModal()"><i class="fas fa-arrow-left"></i> 返回列表</button>
            <button class="btn-close-modal" onclick="closeModal()">关闭</button>
        </div>
    </div>
</div>

<script>
const API = '/api';
let allArticles = [];
let currentCategory = '全部';
let searchKeyword = '';
let currentArticleId = null;

const CAT = {
    'habitat':   { label: '栖息地保护', cls: 'badge-habitat',   icon: '🌿', color: '#27AE60', bg: 'linear-gradient(135deg,#27AE60,#1E8449)' },
    'species':   { label: '物种保护',   cls: 'badge-species',   icon: '🦅', color: '#e74c3c', bg: 'linear-gradient(135deg,#e74c3c,#C0392B)' },
    'knowledge': { label: '生态知识',   cls: 'badge-knowledge', icon: '💡', color: '#3498DB', bg: 'linear-gradient(135deg,#3498DB,#2980B9)' },
    'news':      { label: '保护动态',   cls: 'badge-news',      icon: '📰', color: '#f39c12', bg: 'linear-gradient(135deg,#f39c12,#d68910)' },
};

function getCat(cat) { return CAT[cat] || CAT['knowledge']; }

function calcReadTime(content) {
    if (!content) return '1 分钟';
    const words = content.replace(/<[^>]+>/g, '').length;
    const mins = Math.max(1, Math.round(words / 400));
    return `${mins} 分钟阅读`;
}

function friendlyDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff < 86400) return `${Math.floor(diff/3600)} 小时前`;
    if (diff < 2592000) return `${Math.floor(diff/86400)} 天前`;
    return d.toLocaleDateString('zh-CN', { year:'numeric', month:'short', day:'numeric' });
}

function thumbBg(cat) {
    const c = getCat(cat);
    return c.bg;
}

function renderCards(articles) {
    const grid = document.getElementById('articlesGrid');
    const empty = document.getElementById('emptyState');
    const hint = document.getElementById('resultHint');

    if (articles.length === 0) {
        grid.innerHTML = ''; empty.style.display = 'block'; hint.style.display = 'none'; return;
    }
    empty.style.display = 'none';
    hint.style.display = searchKeyword || currentCategory !== '全部' ? 'block' : 'none';
    document.getElementById('resultCount').textContent = articles.length;

    grid.innerHTML = articles.map(a => {
        const ci = getCat(a.category);
        const readtime = calcReadTime(a.content);
        const date = friendlyDate(a.created_at);
        return `<div class="article-card" data-id="${a.id}" onclick="showDetail(${a.id})">
            <div class="article-thumb">
                ${a.cover_image
                    ? `<img src="${a.cover_image}" alt="${a.title}" loading="lazy">`
                    : `<div class="thumb-placeholder" style="background:${thumbBg(a.category)}">${ci.icon}</div>`
                }
                <div class="cat-overlay">
                    <span class="article-cat-badge ${ci.cls}">${ci.icon} ${ci.label}</span>
                </div>
            </div>
            <div class="article-card-body">
                <div class="article-card-header">
                    <span class="article-date">${date}</span>
                </div>
                <div class="article-title">${a.title}</div>
                <div class="article-summary">${a.summary || '暂无摘要'}</div>
                <div class="article-footer">
                    <span class="article-meta"><i class="fas fa-user"></i> ${a.author_name || '未知作者'}</span>
                    <span class="article-meta reads"><i class="fas fa-eye"></i> ${a.views || 0}</span>
                    <span class="read-time"><i class="fas fa-clock"></i> ${readtime}</span>
                    <span class="read-more">阅读全文 <i class="fas fa-arrow-right"></i></span>
                </div>
            </div>
        </div>`;
    }).join('');
}

function filterArticles() {
    searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    applyFilters();
}

function setCategory(el) {
    currentCategory = el.dataset.cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
}

function applyFilters() {
    let list = allArticles;
    if (currentCategory !== '全部') list = list.filter(a => a.category === currentCategory);
    if (searchKeyword) {
        const kw = searchKeyword;
        list = list.filter(a =>
            (a.title && a.title.toLowerCase().includes(kw)) ||
            (a.summary && a.summary.toLowerCase().includes(kw)) ||
            (a.content && a.content.toLowerCase().includes(kw))
        );
    }
    renderCards(list);
}

function showDetail(id) {
    const a = allArticles.find(x => x.id === id);
    if (!a) return;
    currentArticleId = id;
    const ci = getCat(a.category);

    const cover = document.getElementById('modal-cover');
    if (a.cover_image) {
        cover.src = a.cover_image; cover.className = 'modal-cover';
    } else {
        cover.src = ''; cover.className = 'modal-cover placeholder';
        cover.style.background = thumbBg(a.category);
        cover.innerHTML = `<span style="font-size:80px">${ci.icon}</span>`;
    }

    document.getElementById('modal-cat-badge').textContent = `${ci.icon} ${ci.label}`;
    document.getElementById('modal-cat-badge').className = `modal-cat-badge ${ci.cls}`;
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-author').textContent = a.author_name || '未知作者';
    document.getElementById('modal-readtime').textContent = calcReadTime(a.content);
    document.getElementById('modal-views').textContent = a.views || 0;
    document.getElementById('modal-date').textContent = friendlyDate(a.created_at);
    document.getElementById('modal-summary').textContent = a.summary || '';

    const tagsEl = document.getElementById('modal-tags');
    const kwList = ['黄河', '湿地', '保护', '生态', '鸟类', '水鸟', '候鸟', '濒危', '栖息地', '迁徙'];
    const found = kwList.filter(k => a.content && a.content.includes(k));
    if (found.length) {
        tagsEl.innerHTML = found.slice(0,4).map(k => `<span class="modal-tag">${k}</span>`).join('');
        tagsEl.style.display = 'flex';
    } else { tagsEl.style.display = 'none'; }

    document.getElementById('modal-content').innerHTML = a.content || '<p style="color:#999;text-align:center;padding:40px">暂无正文内容</p>';

    const related = allArticles.filter(x => x.category === a.category && x.id !== a.id).slice(0, 2);
    const relGrid = document.getElementById('related-grid');
    if (related.length) {
        relGrid.innerHTML = related.map(r => `
            <div class="related-card" onclick="showDetail(${r.id})">
                <div class="r-title">${r.title}</div>
                <div class="r-meta">${friendlyDate(r.created_at)} · ${calcReadTime(r.content)}</div>
            </div>`).join('');
        relGrid.parentElement.style.display = 'block';
    } else { relGrid.parentElement.style.display = 'none'; }

    // 根据文章内容中的物种名设置百科链接
    const speciesLinkEl = document.getElementById('modalLinkSpecies');
    if (a.content) {
        // 用文章标题或摘要中的关键词去百科页搜索
        const keyword = (a.title || '').replace(/['""''""''""']/g, '').trim().split(/[，。、,\s]+/)[0];
        speciesLinkEl.href = `/species/?search=${encodeURIComponent(keyword)}`;
        speciesLinkEl.style.display = 'inline-flex';
    } else {
        speciesLinkEl.style.display = 'none';
    }

    document.getElementById('detailModal').classList.add('show');
    document.body.style.overflow = 'hidden';
    window.scrollTo(0, 0);

    const bar = document.getElementById('reading-progress');
    const content = document.getElementById('modal-content');
    content.onscroll = null;
    bar.style.width = '0%';
    content.onscroll = () => {
        const s = content.scrollTop, h = content.scrollHeight - content.clientHeight;
        bar.style.width = h > 0 ? (s/h*100).toFixed(1) + '%' : '0%';
    };

    // 调用后端接口记录阅读次数
    fetch(`${API}/articles/${id}/view/`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            const newViews = data.views || (a.views || 0) + 1;
            a.views = newViews;
            document.getElementById('modal-views').textContent = newViews;
            // 同步更新列表中该文章的显示
            const card = document.querySelector(`.article-card[data-id="${id}"]`);
            if (card) {
                const readsEl = card.querySelector('.article-meta.reads');
                if (readsEl) readsEl.innerHTML = `<i class="fas fa-eye"></i> ${newViews}`;
            }
        })
        .catch(() => {});

    // 给当前打开的文章卡片标记 data-id，方便后续查找
    document.querySelectorAll('.article-card[data-id]').forEach(c => c.removeAttribute('data-id'));
    const openedCard = Array.from(document.querySelectorAll('.article-card')).find(c => c.querySelector('.article-title')?.textContent === a.title);
    if (openedCard) openedCard.setAttribute('data-id', id);
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget && !e.target.closest('.modal-article') &&
        !e.target.classList.contains('btn-close-modal') &&
        !e.target.classList.contains('btn-back')) return;
    document.getElementById('detailModal').classList.remove('show');
    document.body.style.overflow = '';
    document.getElementById('reading-progress').style.width = '0%';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(e); });

async function loadArticles() {
    const grid = document.getElementById('articlesGrid');
    grid.innerHTML = Array.from({length: 3}, () => `
        <div class="skeleton-card">
            <div class="skeleton-thumb"></div>
            <div class="skeleton-body">
                <div class="skeleton-line" style="width:25%"></div>
                <div class="skeleton-line" style="width:80%"></div>
                <div class="skeleton-line" style="width:95%"></div>
                <div class="skeleton-line" style="width:70%"></div>
            </div>
        </div>`).join('');

    try {
        const res = await fetch(`${API}/articles/`);
        const data = await res.json();
        allArticles = data.results || data;

        const counts = { habitat: 0, species: 0, knowledge: 0, news: 0 };
        allArticles.forEach(a => { if (counts[a.category] !== undefined) counts[a.category]++; });

        document.getElementById('totalCount').textContent = allArticles.length;
        document.getElementById('habitatCount').textContent = counts.habitat;
        document.getElementById('speciesCount').textContent = counts.species;
        document.getElementById('knowledgeCount').textContent = counts.knowledge;
        document.getElementById('newsCount').textContent = counts.news;

        renderCards(allArticles);

        const params = new URLSearchParams(window.location.search);
        const autoSearch = params.get('search');
        if (autoSearch) {
            document.getElementById('searchInput').value = autoSearch;
            filterArticles();
            const tryOpen = (attempts) => {
                const cards = document.querySelectorAll('.article-card');
                if (cards.length > 0) { cards[0].click(); }
                else if (attempts > 0) setTimeout(() => tryOpen(attempts - 1), 200);
            };
            setTimeout(() => tryOpen(5), 300);
        }
    } catch (err) {
        grid.innerHTML = `<div class="empty-state">
            <i class="fas fa-wifi"></i>
            <h3>数据加载失败</h3>
            <p>请检查网络连接后刷新重试</p>
        </div>`;
    }
}

loadArticles();
</script>
</body>
</html>
