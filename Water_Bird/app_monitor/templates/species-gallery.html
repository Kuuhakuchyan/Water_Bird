<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物种图库 | 黄河生态方舟</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --earth: #8B6914;
            --moss: #3D6B4F;
            --deep-forest: #1B3A2D;
            --warm-cream: #FAF6EE;
            --card-bg: #ffffff;
            --amber: #D4A853;
            --amber-dark: #B8892E;
            --sky: #5B8FA8;
            --river: #2D6A8A;
            --river-deep: #1A4A6B;
            --text: #2C2C2C;
            --muted: #8A8A8A;
            --border: #E8E0D5;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 6px 24px rgba(0,0,0,0.12);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: #F2EDE4;
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 { font-family: 'Noto Serif SC', serif; }

        /* ========== 导航 ========== */
        .navbar {
            background: rgba(27, 58, 45, 0.97);
            backdrop-filter: blur(16px);
            padding: 0 28px;
            height: 58px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            color: white; text-decoration: none; font-size: 17px; font-weight: 700;
            font-family: 'Noto Serif SC', serif;
        }
        .navbar-brand .logo {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--moss), #6BA888);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-links { display: flex; align-items: center; gap: 2px; }
        .nav-links a {
            color: rgba(255,255,255,0.7); text-decoration: none;
            padding: 6px 13px; border-radius: 8px; font-size: 13px; font-weight: 500;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.95); }
        .nav-links a.active { color: var(--amber); background: rgba(212,168,83,0.12); }

        /* ========== 页面顶部 ========== */
        .page-hero {
            margin-top: 58px;
            background: linear-gradient(180deg, var(--deep-forest) 0%, var(--river-deep) 60%, #234B6E 100%);
            padding: 52px 24px 0;
            position: relative; overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse at 20% 60%, rgba(61,107,79,0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 30%, rgba(91,143,168,0.3) 0%, transparent 50%);
        }
        .hero-content { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; }
        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(212,168,83,0.15);
            border: 1px solid rgba(212,168,83,0.3);
            color: var(--amber); padding: 5px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 600; letter-spacing: 1px;
            margin-bottom: 16px;
        }
        .hero-title {
            font-size: clamp(28px, 5vw, 46px); font-weight: 900;
            color: white; line-height: 1.15; margin-bottom: 12px;
            font-family: 'Noto Serif SC', serif;
        }
        .hero-sub {
            font-size: 14px; color: rgba(255,255,255,0.6);
            max-width: 560px; line-height: 1.7; margin-bottom: 20px; font-weight: 300;
        }
        .hero-stats {
            display: flex; gap: 0; margin: 0 -24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .hero-stat {
            flex: 1; padding: 18px 24px;
            border-right: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }
        .hero-stat:last-child { border-right: none; }
        .hero-stat .num {
            font-size: 28px; font-weight: 900; color: white;
            font-family: 'Noto Serif SC', serif;
        }
        .hero-stat .num.accent { color: var(--amber); }
        .hero-stat .label {
            font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 5px;
        }

        /* ========== 筛选栏 ========== */
        .filter-section {
            max-width: 1100px; margin: 0 auto;
            padding: 24px 24px 0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .search-wrap {
            flex: 1; min-width: 200px; position: relative;
        }
        .search-wrap i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--muted); font-size: 13px;
        }
        .search-wrap input {
            width: 100%; padding: 10px 14px 10px 38px;
            border: 1.5px solid var(--border); border-radius: 10px;
            background: white; font-size: 13px; color: var(--text);
            outline: none; transition: 0.2s; font-family: inherit;
        }
        .search-wrap input:focus {
            border-color: var(--moss); box-shadow: 0 0 0 3px rgba(61,107,79,0.12);
        }
        .filter-btn {
            padding: 9px 16px; border-radius: 10px;
            border: 1.5px solid var(--border); background: white;
            font-size: 13px; font-weight: 500; color: var(--text);
            cursor: pointer; transition: all 0.2s; font-family: inherit;
            white-space: nowrap;
        }
        .filter-btn:hover { border-color: var(--moss); color: var(--moss); }
        .filter-btn.active { background: var(--deep-forest); color: white; border-color: var(--deep-forest); }
        .result-count { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

        /* ========== 图库网格 ========== */
        .gallery-section {
            max-width: 1100px; margin: 0 auto;
            padding: 24px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .gallery-card {
            background: white; border-radius: 16px; overflow: hidden;
            box-shadow: var(--shadow-sm); transition: all 0.3s;
            cursor: pointer; border: 1px solid transparent;
        }
        .gallery-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--amber);
        }
        .gc-img-wrap {
            position: relative; height: 200px; overflow: hidden;
            background: linear-gradient(135deg, #e8e0d5, #d4c8b8);
        }
        .gc-img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.4s ease;
        }
        .gallery-card:hover .gc-img-wrap img { transform: scale(1.05); }
        .gc-img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.6) 100%);
            opacity: 0; transition: opacity 0.3s;
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 12px;
        }
        .gallery-card:hover .gc-img-overlay { opacity: 1; }
        .gc-gallery-btn {
            padding: 5px 14px; border-radius: 20px;
            background: rgba(255,255,255,0.9); color: var(--deep-forest);
            font-size: 11px; font-weight: 700;
            display: flex; align-items: center; gap: 5px;
            transition: all 0.2s;
        }
        .gc-gallery-btn:hover { background: white; transform: scale(1.05); }
        .gc-protection {
            position: absolute; top: 10px; left: 10px;
        }
        .gc-protection-badge {
            padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
            color: white; letter-spacing: 0.5px;
        }
        .gc-protection-badge.lv1 { background: rgba(180,50,50,0.92); }
        .gc-protection-badge.lv2 { background: rgba(180,120,20,0.92); }
        .gc-protection-badge.lv3 { background: rgba(40,130,80,0.92); }
        .gc-protection-badge.none { background: rgba(255,255,255,0.85); color: #555; }

        .gc-body { padding: 14px 16px 12px; }
        .gc-name {
            font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 700;
            color: var(--text); margin-bottom: 2px; line-height: 1.3;
        }
        .gc-latin { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 10px; }
        .gc-source {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 10px; border-radius: 8px;
            background: rgba(61,107,79,0.07); border: 1px solid rgba(61,107,79,0.15);
            margin-bottom: 10px;
        }
        .gc-source-text { font-size: 11px; color: var(--moss); font-weight: 600; }
        .gc-source-suffix { font-size: 10px; color: var(--muted); }
        .gc-img-count {
            display: flex; align-items: center; gap: 5px;
            font-size: 12px; color: var(--muted); margin-bottom: 8px;
        }
        .gc-img-count i { color: var(--amber); }

        /* 跳转按钮 - 改为站内链接 */
        .gc-view-btn {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            width: 100%; padding: 8px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--deep-forest), var(--moss));
            color: white; font-size: 12px; font-weight: 600;
            text-decoration: none; transition: all 0.2s;
            border: none; cursor: pointer; font-family: inherit;
        }
        .gc-view-btn:hover {
            background: linear-gradient(135deg, var(--moss), #4a8a5f);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(61,107,79,0.3);
        }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: 60px 20px; display: none;
        }
        .empty-state i { font-size: 48px; color: var(--border); margin-bottom: 16px; }
        .empty-state h3 { color: var(--text); font-size: 18px; margin-bottom: 8px; }
        .empty-state p { color: var(--muted); font-size: 14px; }

        /* ========== 图片弹窗 ========== */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(10,25,18,0.85); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; align-items: center;
            justify-content: center; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: 20px;
            max-width: 900px; width: 100%; max-height: 90vh;
            overflow-y: auto; box-shadow: 0 30px 100px rgba(0,0,0,0.5);
            transform: translateY(20px); transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title {
            font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 700;
            color: var(--deep-forest);
        }
        .modal-title-sub {
            font-size: 12px; color: var(--muted); font-style: italic;
            margin-top: 2px;
        }
        .modal-close {
            width: 36px; height: 36px; border-radius: 50%;
            background: #f5f0e8; border: none; color: var(--muted);
            font-size: 18px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .modal-close:hover { background: var(--border); color: var(--text); }
        .modal-body { padding: 20px 24px; }
        .modal-img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .modal-img-card {
            border-radius: 12px; overflow: hidden;
            aspect-ratio: 4/3;
            cursor: pointer; transition: all 0.2s;
            position: relative; background: #f0ebe3;
        }
        .modal-img-card:hover { transform: scale(1.03); box-shadow: var(--shadow-md); }
        .modal-img-card img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .modal-img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.5) 100%);
            opacity: 0; transition: opacity 0.2s;
            display: flex; align-items: flex-end; padding: 10px;
        }
        .modal-img-card:hover .modal-img-overlay { opacity: 1; }
        .modal-img-caption {
            font-size: 11px; color: white; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .modal-featured-badge {
            position: absolute; top: 8px; right: 8px;
            padding: 3px 8px; border-radius: 10px;
            background: var(--amber); color: white;
            font-size: 10px; font-weight: 700;
        }
        .modal-img-card.is-featured { border: 2.5px solid var(--amber); }
        .modal-img-card.is-featured .modal-img-overlay { opacity: 1; }
        .modal-set-featured-btn {
            position: absolute; bottom: 36px; right: 8px;
            padding: 4px 10px; border-radius: 8px;
            background: rgba(0,0,0,0.7); color: white;
            font-size: 10px; font-weight: 700; cursor: pointer;
            border: none; display: flex; align-items: center; gap: 4px;
            transition: all 0.2s; font-family: inherit;
        }
        .modal-set-featured-btn:hover { background: var(--amber); transform: scale(1.05); }
        .modal-set-featured-btn.is-featured { background: var(--amber); }
        .modal-set-featured-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .modal-empty {
            text-align: center; padding: 40px;
            color: var(--muted);
        }
        .modal-empty i { font-size: 48px; color: var(--border); margin-bottom: 12px; display: block; }

        /* ========== 全屏图片查看器 ========== */
        .lightbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .lightbox.show { opacity: 1; pointer-events: all; }
        .lightbox img {
            max-width: 90vw; max-height: 90vh;
            border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute; top: 20px; right: 20px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: none; color: white;
            font-size: 20px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: none; color: white;
            font-size: 20px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
        .lightbox-nav.prev { left: 20px; }
        .lightbox-nav.next { right: 20px; }
        .lightbox-caption {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.8); font-size: 13px;
            text-align: center; max-width: 600px;
        }

        /* ========== 页脚 ========== */
        .footer {
            text-align: center; padding: 40px 24px 24px;
            color: var(--muted); font-size: 12px;
            border-top: 1px solid var(--border); margin-top: 40px;
        }
        .footer a { color: var(--river); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* ========== 滚动条 ========== */
        .modal::-webkit-scrollbar { width: 6px; }
        .modal::-webkit-scrollbar-track { background: transparent; }
        .modal::-webkit-scrollbar-thumb { background: #D0C8BE; border-radius: 3px; }

        @media (max-width: 640px) {
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .gc-img-wrap { height: 160px; }
            .hero-stat { padding: 14px 16px; }
            .hero-stat .num { font-size: 22px; }
            .filter-section { padding: 16px 16px 0; }
            .gallery-section { padding: 16px; }
            .modal-img-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="logo"><i class="fas fa-leaf" style="color:white;font-size:16px"></i></div>
        黄河生态方舟
    </a>
    <div class="nav-links">
        <a href="/"><i class="fas fa-th-large"></i> 大屏</a>
        <a href="/report/"><i class="fas fa-camera"></i> 上报</a>
        <a href="/species/"><i class="fas fa-book"></i> 物种百科</a>
        <a href="/articles/"><i class="fas fa-newspaper"></i> 科普</a>
        <a href="/gallery/" class="active"><i class="fas fa-images"></i> 图库</a>
        <a href="/profile/"><i class="fas fa-user"></i> 个人</a>
    </div>
</nav>

<!-- 页面英雄区 -->
<div class="page-hero">
    <div class="hero-content">
        <div class="hero-eyebrow"><i class="fas fa-images"></i> 物种影像库</div>
        <h1 class="hero-title">黄河湿地<span style="color:var(--amber)">鸟类图库</span></h1>
        <p class="hero-sub">收录黄河湿地代表性鸟类的生态影像，点击物种卡片可查看该物种的完整图库。</p>
        <div class="hero-stats">
            <div class="hero-stat">
                <div class="num accent" id="totalCount">—</div>
                <div class="label">收录物种</div>
            </div>
            <div class="hero-stat">
                <div class="num" id="hasImageCount">—</div>
                <div class="label">已配图片</div>
            </div>
            <div class="hero-stat">
                <div class="num" style="color:var(--sky)" id="totalImages">—</div>
                <div class="label">图片总数</div>
            </div>
            <div class="hero-stat">
                <div class="num" style="color:var(--amber)">站内</div>
                <div class="label">图片来源</div>
            </div>
        </div>
    </div>
</div>

<!-- 筛选栏 -->
<div class="filter-section">
    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="搜索物种名称或拉丁名…" oninput="filterGallery()">
    </div>
    <button class="filter-btn active" onclick="setFilter(this, '全部')">全部</button>
    <button class="filter-btn" onclick="setFilter(this, '国家一级')">国家一级</button>
    <button class="filter-btn" onclick="setFilter(this, '国家二级')">国家二级</button>
    <button class="filter-btn" onclick="setFilter(this, '三有动物')">三有动物</button>
    <button class="filter-btn" onclick="setFilter(this, '无保护')">无保护</button>
    <span class="result-count">共 <span id="resultCount">0</span> 种</span>
</div>

<!-- 图库网格 -->
<div class="gallery-section">
    <div class="gallery-grid" id="galleryGrid"></div>
    <div class="empty-state" id="emptyState">
        <i class="fas fa-search"></i>
        <h3>未找到匹配物种</h3>
        <p>请尝试其他关键词或筛选条件</p>
    </div>
</div>

<!-- 页脚 -->
<div class="footer">
    <p>图片来源：站内图库 | 黄河生态方舟 &copy; 2026</p>
</div>

<!-- ========== 图片弹窗 ========== -->
<div class="modal-overlay" id="galleryModal" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modalSpeciesName">—</div>
                <div class="modal-title-sub" id="modalSpeciesLatin">—</div>
            </div>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="modal-img-grid" id="modalImgGrid"></div>
        </div>
    </div>
</div>

<!-- ========== 全屏图片查看器 ========== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    <button class="lightbox-nav prev" onclick="event.stopPropagation(); prevImage()"><i class="fas fa-chevron-left"></i></button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav next" onclick="event.stopPropagation(); nextImage()"><i class="fas fa-chevron-right"></i></button>
    <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
const API = '/api';

// 备用 Wikimedia 图片映射（数据库图片未下载时使用）
const FALLBACK_IMAGES = {
    '大天鹅': 'https://upload.wikimedia.org/wikipedia/commons/2/28/Cygnus_cygnus.jpg',
    '白鹭': 'https://upload.wikimedia.org/wikipedia/commons/9/91/Egretta_garzetta.jpg',
    '鸿雁': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Anser_cygnoides.jpg',
    '黑鹳': 'https://upload.wikimedia.org/wikipedia/commons/8/8c/Ciconia_nigra.jpg',
    '东方白鹳': 'https://upload.wikimedia.org/wikipedia/commons/0/03/Stamp_of_India_-_1994_-_Colnect_163829_-_Oriental_White_Stork_Ciconia_ciconia_boyciana.jpeg',

let allSpecies = [];
let currentFilter = '全部';
let searchKeyword = '';

// Lightbox 状态
let lightboxImages = [];
let lightboxIndex = 0;

function getFallbackImage(nameCn) {
    return FALLBACK_IMAGES[nameCn] || null;
}

// Wikimedia 缩略图 URL 转为原始大图 URL（国内访问更快）
function toOriginalUrl(thumbUrl) {
    if (!thumbUrl || thumbUrl.indexOf('wikimedia.org') === -1) return thumbUrl;
    if (thumbUrl.indexOf('/thumb/') !== -1) {
        return thumbUrl.replace('/thumb/', '/').replace(/\/\d+px-[^/]+$/, '');
    }
    return thumbUrl;
}

function getLevelClass(level) {
    if (!level) return 'none';
    if (level.includes('一级')) return 'lv1';
    if (level.includes('二级')) return 'lv2';
    if (level.includes('三有')) return 'lv3';
    return 'none';
}

function getLevelLabel(level) {
    if (!level || level === '无') return '无保护';
    return level;
}

function cardGradient(name) {
    const palette = [
        'linear-gradient(145deg,#2D5A3E,#1B3A2D)',
        'linear-gradient(145deg,#1A4A6B,#0F3050)',
        'linear-gradient(145deg,#3A5A6E,#1A3A50)',
        'linear-gradient(145deg,#4A3A6E,#2A1A50)',
        'linear-gradient(145deg,#6A3A2A,#3A1A0A)',
        'linear-gradient(145deg,#1A5A5A,#0A3A3A)',
    ];
    if (!name) return palette[0];
    let h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return palette[Math.abs(h) % palette.length];
}

async function init() {
    try {
        const res = await fetch(`${API}/species/`);
        if (!res.ok) throw new Error('API error');
        allSpecies = await res.json();

        // 更新统计
        document.getElementById('totalCount').textContent = allSpecies.length;
        const hasImg = allSpecies.filter(s => s.cover_image_url || getFallbackImage(s.name_cn) || (s.gallery_images && s.gallery_images.length > 0)).length;
        const totalImgs = allSpecies.reduce((sum, s) => sum + (s.gallery_images ? s.gallery_images.length : 0), 0);
        document.getElementById('hasImageCount').textContent = hasImg;
        document.getElementById('totalImages').textContent = totalImgs || '—';

        renderGallery(allSpecies);
    } catch (e) {
        document.getElementById('totalCount').textContent = '—';
        document.getElementById('hasImageCount').textContent = '—';
    }
}

function renderGallery(species) {
    const grid = document.getElementById('galleryGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('resultCount');

    if (species.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        count.textContent = '0';
        return;
    }
    empty.style.display = 'none';
    count.textContent = species.length;

    grid.innerHTML = species.map(s => {
        // 优先使用数据库封面图，其次备用网络图（转为原始图更快）
        const coverImgRaw = s.cover_image_url
            ? s.cover_image_url
            : (s.gallery_images && s.gallery_images.length > 0 && s.gallery_images[0].url)
                ? s.gallery_images[0].url
                : getFallbackImage(s.name_cn);
        const coverImg = toOriginalUrl(coverImgRaw || '');
        const galleryCount = s.gallery_images ? s.gallery_images.length : 0;
        const lvClass = getLevelClass(s.protection_level);
        const lvLabel = getLevelLabel(s.protection_level);
        const sourceText = s.cover_image_url ? '站内图库' : 'Wikimedia';
        const sourceColor = s.cover_image_url ? 'var(--moss)' : 'var(--muted)';

        return `<div class="gallery-card" data-sid="${s.id}" onclick="openGalleryModal(${s.id})">
            <div class="gc-img-wrap">
                ${coverImg
                    ? `<img src="${coverImg}" alt="${s.name_cn}" loading="lazy"
                       onerror="galleryCardFallback(this, ${s.id})">`
                    : `<div style="width:100%;height:100%;background:${cardGradient(s.name_cn)};display:flex;align-items:center;justify-content:center;font-size:48px;color:rgba(255,255,255,0.3);">🐦</div>`
                }
                <div class="gc-img-overlay">
                    <div class="gc-gallery-btn">
                        <i class="fas fa-images"></i>
                        ${galleryCount > 0 ? `查看${galleryCount}张图` : '查看图库'}
                    </div>
                </div>
                <div class="gc-protection">
                    <span class="gc-protection-badge ${lvClass}">${lvLabel}</span>
                </div>
            </div>
            <div class="gc-body">
                <div class="gc-name">${s.name_cn}</div>
                <div class="gc-latin">${s.name_latin || ''}</div>
                <div class="gc-source">
                    <span class="gc-source-text" style="color:${sourceColor}">${sourceText}</span>
                    <span class="gc-source-suffix">${s.cover_image_url ? '· 本地存储' : '· 网络图片'}</span>
                </div>
                ${galleryCount > 0 ? `
                <div class="gc-img-count">
                    <i class="fas fa-images"></i>
                    共 ${galleryCount} 张图片
                </div>` : ''}
                <div class="gc-view-btn" onclick="event.stopPropagation(); openGalleryModal(${s.id})">
                    <i class="fas fa-photo-video"></i>
                    ${galleryCount > 0 ? '进入图库' : '暂无图库'}
                </div>
            </div>
        </div>`;
    }).join('');
}

async function openGalleryModal(speciesId) {
    const s = allSpecies.find(x => x.id === speciesId);
    if (!s) return;

    document.getElementById('modalSpeciesName').textContent = s.name_cn;
    document.getElementById('modalSpeciesLatin').textContent = s.name_latin || '';

    const imgGrid = document.getElementById('modalImgGrid');
    const galleryImages = s.gallery_images || [];
    const coverImgRaw = s.cover_image_url;
    const fallbackImgRaw = getFallbackImage(s.name_cn);

    // 构建图片列表（全部转为原始 Wikimedia URL）
    const allImages = [];
    const seenUrls = new Set();

    // 封面图（当前精选）
    if (coverImgRaw) {
        const coverUrl = toOriginalUrl(coverImgRaw);
        allImages.push({ url: coverUrl, caption: '当前精选封面', featured: true, dbId: galleryImages.find(g => g.url === coverImgRaw)?.id || null, rawUrls: [coverImgRaw] });
        seenUrls.add(coverUrl);
    }
    // 其余图库图片
    galleryImages.forEach((img, i) => {
        if (!img.url) return;
        const url = toOriginalUrl(img.url);
        if (!seenUrls.has(url)) {
            allImages.push({ url: url, caption: img.caption || `图片 ${i + 1}`, featured: !!img.is_featured, dbId: img.id || null, rawUrls: [img.url] });
            seenUrls.add(url);
        }
    });
    // 备用 Wikimedia 图
    if (fallbackImgRaw) {
        const fbUrl = toOriginalUrl(fallbackImgRaw);
        if (!seenUrls.has(fbUrl)) {
            allImages.push({ url: fbUrl, caption: 'Wikimedia Commons 备用', featured: false, dbId: null, rawUrls: [fallbackImgRaw] });
        }
    }

    if (allImages.length === 0) {
        imgGrid.innerHTML = `
            <div class="modal-empty">
                <i class="fas fa-image"></i>
                <p>暂无图片</p>
                <p style="font-size:12px;margin-top:8px">请运行图片下载命令获取图片</p>
            </div>`;
    } else {
        imgGrid.innerHTML = allImages.map((img, i) => `
            <div class="modal-img-card${img.featured ? ' is-featured' : ''}" data-index="${i}" onclick="openLightbox(${i})">
                <img src="${img.url}" alt="${img.caption}" loading="lazy" onerror="galleryImgFallback(this, ${i})">
                ${img.featured ? '<div class="modal-featured-badge"><i class="fas fa-star"></i> 精选封面</div>' : ''}
                <div class="modal-img-overlay">
                    ${img.dbId ? `<button class="modal-set-featured-btn" onclick="event.stopPropagation(); setFeaturedImage(${s.id}, ${img.dbId}, ${i})">
                        <i class="fas fa-star"></i> ${img.featured ? '已设为精选' : '设为精选封面'}
                    </button>` : ''}
                    <div class="modal-img-caption">${img.caption}</div>
                </div>
            </div>
        `).join('');
    }

    // 保存图片列表供 lightbox 和 fallback 使用
    window.modalImages = allImages;

    document.getElementById('galleryModal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

// 图库弹窗图片加载失败时，尝试下一个 URL（本地 → Wikimedia → 备用）
function galleryImgFallback(imgEl, index) {
    const allImages = window.modalImages || [];
    const img = allImages[index];
    if (!img || !img.rawUrls) return;

    // 尝试 rawUrls 中的下一个 URL
    var nextUrl = null;
    var currentSrc = imgEl.src;
    for (var i = 0; i < img.rawUrls.length; i++) {
        var candidate = toOriginalUrl(img.rawUrls[i]);
        if (candidate !== currentSrc) {
            nextUrl = candidate;
            break;
        }
    }
    if (nextUrl) {
        imgEl.src = nextUrl;
        return;
    }
    // 没有更多 URL 了，隐藏图片
    imgEl.style.display = 'none';
}

function closeModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('galleryModal').classList.remove('show');
    document.body.style.overflow = '';
}

// 设置精选后，同步更新图库卡片封面的 img src
function updateGalleryCardCover(speciesId, newCoverUrl) {
    var card = document.querySelector(`.gallery-card[data-sid="${speciesId}"]`);
    if (!card) return;
    var img = card.querySelector('.gc-img-wrap img');
    if (!img) return;
    if (!newCoverUrl) {
        img.style.display = 'none';
        return;
    }
    img.src = toOriginalUrl(newCoverUrl);
    img.style.display = 'block';

    // 更新来源标签
    var sourceEl = card.querySelector('.gc-source-text');
    if (sourceEl) {
        sourceEl.textContent = '站内图库';
        sourceEl.style.color = 'var(--moss)';
    }
    var suffixEl = card.querySelector('.gc-source-suffix');
    if (suffixEl) suffixEl.textContent = '· 本地存储';
}

// 图库卡片封面图加载失败时，尝试图库中下一张图片
function galleryCardFallback(imgEl, speciesId) {
    var sp = allSpecies.find(function(x) { return x.id === speciesId; });
    if (!sp) { imgEl.style.display = 'none'; return; }

    var tried = new Set();
    tried.add(imgEl.src);

    // 先尝试 gallery_images 中其他图片
    var imgs = sp.gallery_images || [];
    for (var i = 0; i < imgs.length; i++) {
        var url = toOriginalUrl(imgs[i].url || '');
        if (url && !tried.has(url)) {
            tried.add(url);
            imgEl.src = url;
            return;
        }
    }
    // 再尝试备用图
    var fb = getFallbackImage(sp.name_cn);
    if (fb && !tried.has(fb)) {
        imgEl.src = fb;
        return;
    }
    imgEl.style.display = 'none';
}

async function setFeaturedImage(speciesId, imageId, cardIndex) {
    const btn = document.querySelector(`[data-index="${cardIndex}"] .modal-set-featured-btn`);
    const originalText = btn ? btn.innerHTML : '';
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 设置中...';
    }
    try {
        const res = await fetch(`${API}/species-images/${imageId}/set-featured/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ species_id: speciesId })
        });
        const data = await res.json();
        if (data.success) {
            // 更新卡片状态
            document.querySelectorAll('.modal-img-card').forEach((card, i) => {
                const badge = card.querySelector('.modal-featured-badge');
                const fBtn = card.querySelector('.modal-set-featured-btn');
                const isFeatured = (i === cardIndex);
                if (isFeatured) {
                    if (!badge) {
                        const b = document.createElement('div');
                        b.className = 'modal-featured-badge';
                        b.innerHTML = '<i class="fas fa-star"></i> 精选封面';
                        card.insertBefore(b, card.firstChild);
                        card.classList.add('is-featured');
                    }
                    if (fBtn) {
                        fBtn.innerHTML = '<i class="fas fa-star"></i> 已设为精选';
                        fBtn.classList.add('is-featured');
                    }
                } else {
                    if (badge) { badge.remove(); card.classList.remove('is-featured'); }
                    if (fBtn) {
                        fBtn.innerHTML = '<i class="fas fa-star"></i> 设为精选封面';
                        fBtn.classList.remove('is-featured');
                    }
                }
            });
            // 同步更新 allSpecies 中的数据
            const s = allSpecies.find(x => x.id === speciesId);
            if (s) {
                // 更新 gallery_images 的 is_featured 标志
                if (s.gallery_images) {
                    s.gallery_images.forEach(img => {
                        img.is_featured = (img.id === imageId);
                    });
                }
                // 更新封面图 URL
                s.cover_image_url = data.cover_image_url || null;
                // 同步更新图库页面卡片封面图
                updateGalleryCardCover(speciesId, data.cover_image_url);
            }

            // 关闭弹窗（可选，取消注释则关闭）
            // closeModal();
        } else {
            alert('设置失败: ' + (data.message || '未知错误'));
        }
    } catch (e) {
        alert('设置失败: 网络错误');
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }
}

function getCSRFToken() {
    let token = document.cookie.match(/csrftoken=([^;]+)/);
    return token ? token[1] : '';
}

function openLightbox(index) {
    if (!window.modalImages || window.modalImages.length === 0) return;
    lightboxImages = window.modalImages;
    lightboxIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
}

function updateLightbox() {
    const img = lightboxImages[lightboxIndex];
    document.getElementById('lightboxImg').src = img.url;
    document.getElementById('lightboxCaption').textContent = img.caption || '';
}

function prevImage() {
    lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
    updateLightbox();
}

function nextImage() {
    lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
    updateLightbox();
}

// 键盘控制
document.addEventListener('keydown', (e) => {
    if (document.getElementById('lightbox').classList.contains('show')) {
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') prevImage();
        if (e.key === 'ArrowRight') nextImage();
    } else if (document.getElementById('galleryModal').classList.contains('show')) {
        if (e.key === 'Escape') closeModal();
    }
});

function filterGallery() {
    searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    applyFilters();
}

function setFilter(el, level) {
    currentFilter = level;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    applyFilters();
}

function applyFilters() {
    let list = allSpecies;
    if (currentFilter === '国家一级') list = list.filter(s => s.protection_level && s.protection_level.includes('一级'));
    else if (currentFilter === '国家二级') list = list.filter(s => s.protection_level && s.protection_level.includes('二级'));
    else if (currentFilter === '三有动物') list = list.filter(s => s.protection_level && s.protection_level.includes('三有'));
    else if (currentFilter === '无保护') list = list.filter(s => !s.protection_level || s.protection_level === '无' || s.protection_level === '');

    if (searchKeyword) list = list.filter(s =>
        (s.name_cn && s.name_cn.toLowerCase().includes(searchKeyword)) ||
        (s.name_latin && s.name_latin.toLowerCase().includes(searchKeyword)) ||
        (s.order && s.order.toLowerCase().includes(searchKeyword)) ||
        (s.family && s.family.toLowerCase().includes(searchKeyword))
    );
    renderGallery(list);
}

init();
</script>
</body>
</html>
