<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">文章详情 | 黄河生态方舟</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #9B59B6; --dark: #0a2e38;
            --text: #1a2a3a; --muted: #7a8fa6;
            --danger: #e74c3c; --warn: #f39c12; --safe: #27ae60;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a2e38 0%, #1a1a5e 50%, #7B2D8B 100%);
            min-height: 100vh; color: var(--text);
        }
        #reading-progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #9B59B6, #e74c3c); width: 0%; z-index: 9999; transition: width 0.1s; }
        .navbar {
            background: rgba(10,46,56,0.97); backdrop-filter: blur(20px);
            padding: 0 24px; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; font-size: 18px; font-weight: 700; }
        .navbar-brand .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #3498db); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; transition: all 0.2s; }
        .nav-links a:hover { background: rgba(155,89,182,0.2); color: white; }
        .nav-links a.active { color: var(--primary); background: rgba(155,89,182,0.15); }
        .nav-back { margin-left: auto; padding: 6px 14px; border-radius: 8px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); text-decoration: none; font-size: 13px; transition: all 0.2s; }
        .nav-back:hover { background: rgba(255,255,255,0.2); color: white; }

        .detail-container { max-width: 760px; margin: 80px auto 60px; padding: 0 20px; }

        /* 封面 */
        .article-cover { border-radius: 20px; overflow: hidden; margin-bottom: 24px; position: relative; height: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .article-cover img { width: 100%; height: 100%; object-fit: cover; }
        .article-cover .cover-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 100px; }

        /* 头部信息 */
        .article-header { margin-bottom: 24px; }
        .article-meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
        .article-cat-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; color: white; }
        .article-date { font-size: 12px; color: #bbb; display: flex; align-items: center; gap: 4px; }
        .article-stats { display: flex; align-items: center; gap: 14px; font-size: 12px; color: #aaa; margin-top: 8px; }
        .article-stats span { display: flex; align-items: center; gap: 4px; }
        .article-stats .reads { color: var(--danger); }
        .article-title { font-size: 30px; font-weight: 900; color: #1a3a4a; line-height: 1.35; margin-bottom: 10px; }
        .article-summary { font-size: 15px; color: #666; line-height: 1.7; border-left: 4px solid var(--primary); padding-left: 14px; margin-bottom: 6px; }
        .article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .article-tag { padding: 3px 10px; border-radius: 8px; background: #f5f0ff; color: var(--primary); font-size: 12px; font-weight: 600; }

        /* 正文 */
        .article-body { background: rgba(255,255,255,0.97); border-radius: 18px; padding: 28px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); font-size: 16px; line-height: 1.9; color: #444; }
        .article-body p { margin-bottom: 16px; }
        .article-body img { max-width: 100%; border-radius: 8px; margin: 12px 0; }
        .article-body h2, .article-body h3 { color: var(--dark); margin: 24px 0 12px; font-weight: 800; }
        .article-body a { color: var(--primary); }

        /* 相关文章 */
        .related-section { background: rgba(255,255,255,0.97); border-radius: 18px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 16px; }
        .related-title { font-size: 13px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .related-title i { color: var(--primary); }
        .related-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .related-card { background: #f8f9fa; border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; text-decoration: none; display: block; }
        .related-card:hover { border-color: var(--primary); background: #f5f0ff; transform: translateY(-2px); }
        .related-card .r-title { font-size: 14px; font-weight: 700; color: #1a3a4a; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .related-card .r-meta { font-size: 11px; color: #bbb; }
        .related-card .r-cat { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; color: white; margin-bottom: 6px; }

        /* 操作按钮 */
        .action-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .action-btn { flex: 1; min-width: 140px; padding: 13px 16px; border-radius: 14px; text-decoration: none; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1); }
        .action-btn.species { background: linear-gradient(135deg, #0EBFA7, #16a085); color: white; box-shadow: 0 6px 20px rgba(14,191,167,0.35); }
        .action-btn.list { background: linear-gradient(135deg, #9B59B6, #7d3c98); color: white; box-shadow: 0 6px 20px rgba(155,89,182,0.35); }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.25); }

        .loading { text-align: center; padding: 80px 20px; color: rgba(255,255,255,0.5); }
        .loading i { font-size: 48px; margin-bottom: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
        .error-msg { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
        .error-msg a { color: var(--primary); text-decoration: none; }
        @media (max-width: 640px) { .related-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="reading-progress"></div>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="logo"><i class="fas fa-dragon" style="color:white"></i></div>
        黄河生态方舟
    </a>
    <div class="nav-links">
        <a href="/"><i class="fas fa-map-marked-alt"></i> 大屏</a>
        <a href="/species/"><i class="fas fa-book"></i> 物种百科</a>
        <a href="/articles/" class="active"><i class="fas fa-newspaper"></i> 科普</a>
        <a href="/report/"><i class="fas fa-camera"></i> 上报</a>
    </div>
    <a href="/articles/" class="nav-back"><i class="fas fa-arrow-left"></i> 返回文章</a>
</nav>

<div class="detail-container" id="app">
    <div class="loading"><i class="fas fa-spinner"></i><h3>正在加载文章...</h3></div>
</div>

<script>
const API = '/api';

const CAT = {
    'habitat':   { label:'栖息地保护', cls:'badge-habitat',   icon:'🌿', bg:'linear-gradient(135deg,#27AE60,#1E8449)' },
    'species':   { label:'物种保护',   cls:'badge-species',   icon:'🦅', bg:'linear-gradient(135deg,#e74c3c,#C0392B)' },
    'knowledge': { label:'生态知识',   cls:'badge-knowledge', icon:'💡', bg:'linear-gradient(135deg,#3498DB,#2980B9)' },
    'news':      { label:'保护动态',   cls:'badge-news',      icon:'📰', bg:'linear-gradient(135deg,#f39c12,#d68910)' },
};

function getCat(cat) { return CAT[cat] || CAT['knowledge']; }
function calcReadTime(content) {
    if (!content) return '1 分钟';
    const w = content.replace(/<[^>]+>/g,'').length;
    return `${Math.max(1,Math.round(w/400))} 分钟阅读`;
}
function friendlyDate(d) {
    if (!d) return '—';
    const dd = new Date(d), now = new Date();
    const diff = Math.floor((now-dd)/1000);
    if (diff<60) return '刚刚';
    if (diff<3600) return `${Math.floor(diff/60)} 分钟前`;
    if (diff<86400) return `${Math.floor(diff/3600)} 小时前`;
    if (diff<2592000) return `${Math.floor(diff/86400)} 天前`;
    return dd.toLocaleDateString('zh-CN',{year:'numeric',month:'short',day:'numeric'});
}

async function init() {
    const id = window.location.pathname.match(/\/articles\/(\d+)\//)?.[1];
    if (!id) {
        document.getElementById('app').innerHTML = `<div class="error-msg"><h3>未找到文章ID</h3><a href="/articles/">返回文章列表</a></div>`;
        return;
    }

    try {
        // 并行请求：当前文章 + 相关文章
        const [detailRes, listRes] = await Promise.all([
            fetch(`${API}/articles/${id}/`),
            fetch(`${API}/articles/`),
        ]);
        if (!detailRes.ok) throw new Error('not found');
        const detail = await detailRes.json();
        const allArticles = (await listRes.json()).results || [];

        document.title = `${detail.title} | 黄河生态方舟`;
        const ci = getCat(detail.category);
        const readtime = calcReadTime(detail.content);
        const kwList = ['黄河','湿地','保护','生态','鸟类','水鸟','候鸟','濒危','栖息地','迁徙'];
        const tags = kwList.filter(k => detail.content && detail.content.includes(k)).slice(0,4);
        const related = allArticles.filter(a => a.category === detail.category && a.id !== detail.id).slice(0,2);

        document.getElementById('app').innerHTML = `
            <div class="article-cover">
                ${detail.cover_image
                    ? `<img src="${detail.cover_image}" alt="${detail.title}">`
                    : `<div class="cover-placeholder" style="background:${ci.bg}">${ci.icon}</div>`
                }
            </div>

            <div class="article-header">
                <div class="article-meta-row">
                    <span class="article-cat-badge ${ci.cls}" style="background:${ci.bg}">${ci.icon} ${ci.label}</span>
                    <span class="article-date"><i class="fas fa-clock"></i> ${readtime}</span>
                </div>
                <h1 class="article-title">${detail.title}</h1>
                ${detail.summary ? `<div class="article-summary">${detail.summary}</div>` : ''}
                <div class="article-stats">
                    <span><i class="fas fa-user"></i> ${detail.author_name || '未知作者'}</span>
                    <span class="reads"><i class="fas fa-eye"></i> <span id="views-display">${detail.views || 0}</span> 阅读</span>
                    <span><i class="fas fa-calendar"></i> ${friendlyDate(detail.created_at)}</span>
                </div>
                ${tags.length ? `<div class="article-tags">${tags.map(t=>`<span class="article-tag">${t}</span>`).join('')}</div>` : ''}
            </div>

            <div class="article-body" id="article-content">${detail.content || '<p style="color:#999;text-align:center">暂无正文内容</p>'}</div>

            ${related.length ? `
            <div class="related-section">
                <div class="related-title"><i class="fas fa-feather-alt"></i> 相关推荐</div>
                <div class="related-grid">
                    ${related.map(r => {
                        const rc = getCat(r.category);
                        return `<a href="/articles/${r.id}/" class="related-card">
                            <span class="r-cat" style="background:${rc.bg}">${rc.icon} ${rc.label}</span>
                            <div class="r-title">${r.title}</div>
                            <div class="r-meta">${friendlyDate(r.created_at)} · ${calcReadTime(r.content)}</div>
                        </a>`;
                    }).join('')}
                </div>
            </div>` : ''}

            <div class="related-section">
                <div class="action-row">
                    <a href="/species/" class="action-btn species"><i class="fas fa-book"></i> 探索物种百科</a>
                    <a href="/articles/" class="action-btn list"><i class="fas fa-list"></i> 返回文章列表</a>
                </div>
            </div>
        `;

        // 阅读进度条
        const bar = document.getElementById('reading-progress');
        const content = document.getElementById('article-content');
        content.onscroll = null;
        bar.style.width = '0%';
        content.onscroll = () => {
            const s = content.scrollTop, h = content.scrollHeight - content.clientHeight;
            bar.style.width = h > 0 ? (s/h*100).toFixed(1)+'%' : '0%';
        };

        // 记录阅读次数
        fetch(`${API}/articles/${id}/view/`, { method:'POST' })
            .then(res => res.json())
            .then(data => {
                const v = data.views || (detail.views||0)+1;
                detail.views = v;
                const el = document.getElementById('views-display');
                if (el) el.textContent = v;
            }).catch(() => {});

    } catch(e) {
        document.getElementById('app').innerHTML = `<div class="error-msg"><i class="fas fa-search" style="font-size:48px;display:block;margin-bottom:16px"></i><h3>未找到该文章</h3><p style="margin-bottom:16px">可能已被删除或ID无效</p><a href="/articles/">返回文章列表</a></div>`;
    }
}
init();
</script>
</body>
</html>
