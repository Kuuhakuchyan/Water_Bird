<script>

const FALLBACK_ARTICLES = [
    {
        id: 1, category: 'habitat', title: '黄河湿地：候鸟迁徙的重要驿站',
        summary: '黄河湿地国家级自然保护区是东亚-澳大利西亚候鸟迁徙路线上的重要驿站，每年秋季，数百万只候鸟从这里飞过，补充能量后继续南迁。',
        content: `<p>黄河湿地国家级自然保护区位于河南省郑州市北部黄河河道及沿岸，是我国中部地区重要的湿地生态系统之一。每年春秋两季，这里都会迎来大规模的候鸟迁徙高峰期。</p><h3>为什么黄河湿地如此重要？</h3><p>黄河湿地地处我国三大候鸟迁徙通道之一——东亚-澳大利西亚迁徙路线的中段位置。每年10月至次年3月，来自西伯利亚、蒙古和我国内蒙古地区的候鸟，会在这里停歇觅食，补充长途飞行消耗的能量。</p><h3>主要保护措施</h3><p>近年来，郑州市持续推进黄河湿地生态修复工作，通过退耕还湿、水体治理、禁止人为干扰等措施，为候鸟创造了更加安全的栖息环境。保护区内设置了多个观测站，监测鸟类种群动态和迁徙规律。</p><h3>观鸟提示</h3><p>在观测候鸟时，请务必保持安静，与鸟类保持100米以上的安全距离。不使用强光照射，不要投喂食物，让鸟类自然活动，这是对它们最好的保护。</p>`,
        views: 2847, created_at: '2026-03-15', author_name: '生态方舟团队'
    },
    {
        id: 2, category: 'species', title: '白鹤：世界上最濒危的鹤类之一',
        summary: '白鹤是世界上最濒危的鹤类之一，全球种群数量不足4000只。作为东亚-澳大利西亚迁徙路线上的旗舰物种，白鹤的保护备受国际关注。',
        content: `<p>白鹤（Grus leucogeranus）是世界极危物种，全球种群数量不足4000只，被 IUCN 列为极危（CR）等级，在我国被列国家一级重点保护野生动物。</p><h3>形态特征</h3><p>白鹤体长约130厘米，全身羽毛主要为白色，初级飞羽为黑色，头顶裸露皮肤呈鲜红色，嘴和腿为粉红色。幼鸟体羽呈黄褐色，随着年龄增长逐渐变白。</p><h3>迁徙习性</h3><p>白鹤从俄罗斯西伯利亚的繁殖地出发，途经黄河湿地补充能量后，继续飞往我国长江中下游的鄱阳湖越冬。整个迁徙旅程长达5000公里以上。</p><h3>保护现状</h3><p>黄河湿地是白鹤迁徙途中最重要的能量补给站之一。近年来，随着湿地保护力度加大，白鹤在黄河湿地的观测记录逐年增加，种群数量呈现恢复趋势。</p>`,
        views: 1932, created_at: '2026-03-10', author_name: '生态方舟团队'
    },
    {
        id: 3, category: 'knowledge', title: '什么是湿地？湿地的生态功能有哪些？',
        summary: '湿地被称为"地球之肾"，是地球上生物多样性最丰富的生态系统之一。了解湿地的生态功能，是保护湿地的基础。',
        content: `<p>湿地是介于水生和陆生生态系统之间的独特类型，土地长期被浅层水体覆盖，或者土壤含水量接近饱和，是自然界生物多样性最丰富的生态系统之一。</p><h3>湿地的生态功能</h3><p><strong>水源涵养：</strong>湿地如同巨大的海绵，在雨季吸收雨水，在旱季释放水分，调节河流水量，是天然的"水资源调节器"。</p><p><strong>碳汇功能：</strong>湿地储存了全球约12%的陆地碳储量，在应对气候变化中发挥着重要作用。</p><p><strong>生物多样性：</strong>全球40%的物种在湿地生活或繁殖，湿地是鱼类的产卵场、鸟类的栖息地、两栖动物的家园。</p><p><strong>水质净化：</strong>湿地植物能够吸收水体中的营养物质和污染物，降解有害物质，起到"天然污水处理厂"的作用。</p><h3>黄河湿地面临的威胁</h3><p>围垦开发、水污染、过度放牧、外来物种入侵等是人类活动对湿地造成的主要威胁。保护湿地，需要全社会的共同参与。</p>`,
        views: 3105, created_at: '2026-03-05', author_name: '生态方舟团队'
    },
    {
        id: 4, category: 'news', title: '2026年春季黄河湿地鸟类同步调查顺利完成',
        summary: '3月中旬，郑州市林业部门联合多所高校，完成了2026年春季黄河湿地鸟类同步调查，共记录鸟类136种，其中受保护物种18种。',
        content: `<p>2026年3月10日至15日，郑州市林业局联合河南大学、郑州大学等高校科研团队，圆满完成了本年度春季黄河湿地鸟类同步调查工作。</p><h3>调查范围与方法</h3><p>本次调查覆盖黄河湿地国家级自然保护区核心区、缓冲区和实验区，共设置32个观测样点，采用样线法和样点法相结合的方式进行。</p><h3>调查结果</h3><p>本次调查共记录鸟类<strong>136种</strong>，隶属17目52科，其中雁形目、鹈形目和鹤形目物种数量最多。记录到国家一级保护动物白鹤8只、国家二级保护动物大天鹅126只，以及三有动物鸿雁、普通鸬鹚等优势种群。</p><h3>调查意义</h3><p>通过持续的同步调查，能够系统掌握黄河湿地鸟类资源的时空变化规律，为湿地保护管理提供科学依据，也为"黄河生态方舟"平台的数据积累提供支撑。</p>`,

    },

        id: 5, category: 'species', title: '东方白鹳：忠贞不渝的"爱情鸟"',

        content: `<p>东方白鹳（Ciconia boyciana）属于鹳形目鹳科，是国家一级重点保护野生动物，全球野生种群数量估计不足3000只，被列入《世界自然保护联盟濒危物种红色名录》。</p><h3>形态特征</h3><p>东方白鹳体长约110厘米，体羽主要为白色，嘴黑色粗长呈锥形，腿较长呈红色。飞行时可见黑色飞羽，与白色体羽形成鲜明对比，十分优雅。</p><h3>繁殖习性</h3><p>东方白鹳有"爱情鸟"之称，它们一旦配对便终生不渝，每年返回同一巢址繁殖。巢穴巨大，直径可达1.5米，由树枝和泥土堆积而成，可使用数十年。</p><h3>食性特点</h3><p>东方白鹳主要以鱼类和蛙类为食，也会捕食小型爬行动物和昆虫。它们觅食时站立浅水中，静静等待猎物靠近，然后快速用长嘴啄击捕获。</p><h3>黄河湿地分布</h3><p>黄河湿地是东方白鹳的重要觅食地和停歇地。近年来，保护区持续监测到东方白鹳的活动记录，种群呈稳定恢复态势。</p>`,

function catLabel(cat) {
    const m = { habitat:'栖息地保护', species:'物种保护', knowledge:'生态知识', news:'保护动态' };
    return m[cat] || cat;
}
function catClass(cat) { return 'cat-' + cat; }

function renderList(articles) {
    const filtered = currentCat === 'all' ? articles : articles.filter(a => a.category === currentCat);
    if (filtered.length === 0) {
        $('#articlesGrid').html(`<div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.3)"><i class="fas fa-feather-alt" style="font-size:50px;display:block;margin-bottom:15px;"></i>暂无此类文章</div>`);
        return;
    }
    // 第一个为置顶
    const [featured, ...rest] = filtered;
    currentArticles = [featured, ...rest];
    $('#featuredCat').attr('class', 'featured-cat ' + catClass(featured.category)).text(catLabel(featured.category));
    $('#featuredTitle').text(featured.title);
    $('#featuredSummary').text(featured.summary);
    $('#featuredDate').text(featured.created_at ? featured.created_at.slice(0,10) : '');
    $('#featuredViews').text(featured.views || 0);
    $('#featuredCard').attr('onclick', `showModal(currentArticles[0])`);

    $('#articlesGrid').html(rest.map((a, i) => `
        <div class="article-card" onclick="showModal(currentArticles[${i+1}])">
            <div class="card-img"><i class="fas fa-feather-alt"></i></div>
            <div class="card-body">
                <div class="card-title">${a.title}</div>
                <div class="card-summary">${a.summary || ''}</div>
                <div class="card-meta">
                    <span><i class="far fa-calendar"></i>${a.created_at ? a.created_at.slice(0,10) : ''}</span>
                    <span><i class="far fa-eye"></i>${a.views || 0}</span>
                </div>
            </div>
        </div>
    `).join(''));
}

function showModal(article) {
    if (!article) return;
    $('#modalCat').attr('class', 'featured-cat ' + catClass(article.category)).text(catLabel(article.category));
    $('#modalTitle').text(article.title);
    $('#modalDate').text(article.created_at ? article.created_at.slice(0,10) : '');
    $('#modalViews').text(article.views || 0);
    $('#modalContent').html(article.content || `<p>${article.summary || ''}</p>`);
    $('#articleModal').addClass('active');
    document.body.style.overflow = 'hidden';
    // 记录阅读
    if (article.id) {
        $.post(API + '/articles/' + article.id + '/view/').catch(() => {});
    }
}

function closeModal() {
    $('#articleModal').removeClass('active');
    document.body.style.overflow = '';
}

$(document).ready(function() {
    $.ajax({ url: API + '/articles/', method: 'GET', success: function(data) {
        const articles = data.results || data;
        if (articles.length === 0) articles = FALLBACK_ARTICLES;
        renderList(articles);
    }, error: function() { renderList(FALLBACK_ARTICLES); }});

    $('.filter-tag').click(function() {
        $('.filter-tag').removeClass('active');
        $(this).addClass('active');
        currentCat = $(this).data('cat');
        const all = currentArticles.length ? currentArticles : FALLBACK_ARTICLES;
        renderList(all);
    });

    $(document).on('keydown', e => { if (e.key === 'Escape') closeModal(); });
    $('#articleModal').on('click', e => { if (e.target === this) closeModal(); });

    // 导航
    const token = localStorage.getItem('yb_token');
    if (token) {
        $.ajax({ url: API + '/profiles/me/', method: 'GET', headers: { 'Authorization': 'Token ' + token },
            success: function(d) { $('#navLogin').replaceWith(`<a href="/profile/" style="color:#5DD39E"><i class="fas fa-user"></i> ${d.username}</a>`); },
            error: function() {} });
    }
});
</script>
