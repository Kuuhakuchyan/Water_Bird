<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 | 黄河生态方舟</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-aqua: #00ADB5;
            --c-dark: #2C3E50;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8f6f7 0%, #d4edf0 50%, #c5e6e8 100%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-box {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .login-header {
            background: linear-gradient(135deg, var(--c-aqua), #008c93);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-header p {
            margin-top: 8px;
            opacity: 0.9;
            font-size: 13px;
        }

        .login-body {
            padding: 30px;
        }

        .tab-switch {
            display: flex;
            margin-bottom: 25px;
            background: #f0f2f5;
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: var(--c-aqua);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--c-aqua);
            box-shadow: 0 0 0 3px rgba(0,173,181,0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--c-aqua), #008c93);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,173,181,0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--c-aqua);
            text-decoration: none;
            font-size: 13px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .login-container {
                padding: 15px;
            }
            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
                        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
                    </svg>
                    黄河生态方舟
                </h1>
                <p>水鸟监测 · 生态保护 · 数据共享</p>
            </div>

            <div class="login-body">
                <!-- 消息提示 -->
                <div id="msgBox" class="message"></div>

                <!-- 登录表单 -->
                <div id="loginSection" class="form-section active">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button class="btn-submit" onclick="doLogin()">登录</button>
                </div>

                <!-- 注册表单 -->
                <div id="registerSection" class="form-section">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" placeholder="3-20位字母或数字" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="regEmail" placeholder="用于找回密码（选填）" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" placeholder="至少8位，包含数字和字母" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" autocomplete="new-password">
                    </div>
                    <button class="btn-submit" onclick="doRegister()">注册</button>
                </div>

                <!-- 切换标签 -->
                <div class="tab-switch">
                    <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                    <button class="tab-btn" onclick="switchTab('register')">注册</button>
                </div>

                <div class="back-link">
                    <a href="/">&larr; 返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API = '/api';
        const TOKEN_KEY = 'yb_token';
        const USER_KEY = 'yb_user';

        function switchTab(tab) {
            $('.tab-btn').removeClass('active');
            if (tab === 'login') {
                $('.tab-btn').eq(0).addClass('active');
                $('#loginSection').addClass('active');
                $('#registerSection').removeClass('active');
            } else {
                $('.tab-btn').eq(1).addClass('active');
                $('#loginSection').removeClass('active');
                $('#registerSection').addClass('active');
            }
            $('#msgBox').hide();
        }

        function showMsg(msg, type) {
            $('#msgBox').text(msg).removeClass('success error').addClass(type);
        }

        function doLogin() {
            const username = $('#loginUsername').val().trim();
            const password = $('#loginPassword').val();

            if (!username || !password) {
                showMsg('请填写用户名和密码', 'error');
                return;
            }

            $.ajax({
                url: API + '/login/',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username, password }),
                success: function(res) {
                    const token = res.token;
                    localStorage.setItem(TOKEN_KEY, token);
                    // 获取用户信息
                    $.ajax({
                        url: API + '/profiles/me/',
                        method: 'GET',
                        headers: { 'Authorization': 'Token ' + token },
                        success: function(user) {
                            localStorage.setItem(USER_KEY, JSON.stringify(user));
                            showMsg('登录成功！正在跳转...', 'success');
                            setTimeout(() => window.location.href = '/profile/', 1000);
                        },
                        error: function() {
                            // token 保存成功就算登录成功
                            showMsg('登录成功！正在跳转...', 'success');
                            setTimeout(() => window.location.href = '/profile/', 1000);
                        }
                    });
                },
                error: function(xhr) {
                    const err = xhr.responseJSON || {};
                    showMsg(err.detail || '用户名或密码错误', 'error');
                }
            });
        }

        function doRegister() {
            const username = $('#regUsername').val().trim();
            const email = $('#regEmail').val().trim();
            const password = $('#regPassword').val();
            const password_confirm = $('#regPasswordConfirm').val();

            if (!username || !password) {
                showMsg('用户名和密码不能为空', 'error');
                return;
            }
            if (password !== password_confirm) {
                showMsg('两次密码输入不一致', 'error');
                return;
            }
            if (password.length < 8) {
                showMsg('密码至少8位', 'error');
                return;
            }

            $.ajax({
                url: API + '/auth/register/',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ username, email, password, password_confirm }),
                success: function(res) {
                    showMsg('注册成功！即将跳转至登录页面...', 'success');
                    setTimeout(() => switchTab('login'), 1500);
                },
                error: function(xhr) {
                    const err = xhr.responseJSON || {};
                    const msgs = Object.values(err).flat().join('；') || '注册失败，请检查输入';
                    showMsg(msgs, 'error');
                }
            });
        }

        // 回车键快捷提交
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if ($('#loginSection').is(':visible')) {
                    doLogin();
                } else {
                    doRegister();
                }
            }
        });

        // 页面加载时检查是否已登录
        $(function() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                // 已登录则跳转个人中心
                window.location.href = '/profile/';
            }
        });
    </script>
</body>
</html>
