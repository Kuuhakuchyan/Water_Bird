<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>看图识鸟 | 黄河生态方舟</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="../static/app_monitor/css/games.css">
    <style>
        /* 鸟类图片映射 - 使用网络真实图片 */
        .game-instruction {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- 顶部导航 -->
        <div class="game-header">
            <div class="game-title">
                <i class="fas fa-feather"></i>
                看图识鸟
            </div>
            <div class="game-score">
                <div class="score-item">
                    <span class="score-label">得分</span>
                    <span class="score-value" id="score">0</span>
                </div>
                <div class="score-item combo">
                    <span class="score-label">连击</span>
                    <span class="score-value" id="combo">0</span>
                </div>
                <div class="score-item">
                    <span class="score-label">题数</span>
                    <span class="score-value"><span id="current">0</span>/<span id="total">10</span></span>
                </div>
            </div>
        </div>

        <!-- 主游戏区域 -->
        <div class="game-main">
            <!-- 开始界面 -->
            <div id="startScreen" class="start-screen glass-panel">
                <div class="start-title">看图识鸟</div>
                <div class="start-subtitle">
                    通过图片识别湿地水鸟，考验你的鸟类知识！<br>
                    答对+10分，连续答对3次额外+5分
                </div>
                <button class="start-btn" onclick="game.start()">
                    <i class="fas fa-play"></i> 开始挑战
                </button>
                <div style="margin-top: 20px;">
                    <a href="/" style="color: var(--c-aqua); text-decoration: none; font-size: 14px;">
                        <i class="fas fa-arrow-left"></i> 返回首页
                    </a>
                </div>
            </div>

            <!-- 游戏进行中 -->
            <div id="gameScreen" style="display: none; width: 100%;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>

                <div class="bird-image-container" id="birdImageContainer">
                    <img id="birdImage" src="" alt="请识别这只鸟">
                </div>

                <p class="game-instruction">这是什么鸟类？</p>

                <div class="options-grid" id="optionsGrid">
                    <!-- 选项按钮由JS生成 -->
                </div>
            </div>

            <!-- 结果界面 -->
            <div id="resultScreen" style="display: none; width: 100%;">
                <div class="result-screen glass-panel">
                    <div class="start-title">本轮结束</div>
                    <div class="result-label">你的得分</div>
                    <div class="result-score" id="finalScore">0</div>

                    <div class="result-stats">
                        <div class="stat-box">
                            <div class="stat-value" id="correctCount" style="color: var(--c-green)">0</div>
                            <div class="stat-label">答对</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="wrongCount" style="color: var(--c-red)">0</div>
                            <div class="stat-label">答错</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="maxCombo" style="color: var(--c-orange)">0</div>
                            <div class="stat-label">最高连击</div>
                        </div>
                    </div>

                    <div class="review-list" id="reviewList">
                        <!-- 答题回顾 -->
                    </div>

                    <button class="start-btn" onclick="game.restart()">
                        <i class="fas fa-redo"></i> 再来一局
                    </button>
                    <a href="/" class="start-btn" style="display: inline-block; margin-top: 10px; text-decoration: none; background: linear-gradient(135deg, var(--c-dark), #1a252f);">
                        <i class="fas fa-home"></i> 返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // ===== 黄河湿地物种数据（优先从 API 加载，失败时用本地数据）=====
        const YR_SPECIES_FALLBACK = [
            {name:'大天鹅', latin:'Cygnus cygnus', image:'https://images.unsplash.com/photo-1506477335437-0c4ed8c2ee7f?w=400&h=400&fit=crop', protection:'国家二级保护', habit:'每年10月至次年3月迁徙至黄河湿地越冬，常在开阔水域集群活动。以水生植物种子、茎叶及少量软体动物为食。'},
            {name:'白鹤', latin:'Grus leucogeranus', image:'https://images.unsplash.com/photo-1552728089-57bdde30beb3?w=400&h=400&fit=crop', protection:'国家一级保护（极危）', habit:'世界极危物种，每年迁徙经停黄河湿地。体长约130cm，通体白色，飞行时可见黑色初级飞羽。栖息于浅水沼泽，以植物根茎和鱼虾为食。'},
            {name:'东方白鹳', latin:'Ciconia boyciana', image:'https://images.unsplash.com/photo-1555169062-013468b47731?w=400&h=400&fit=crop', protection:'国家一级保护', habit:'大型涉禽，体长约110cm，嘴黑色粗长，腿红色。在黄河湿地繁殖，营巢于高大树木或电力塔上，以鱼类和蛙类为主食。'},
            {name:'黑鹳', latin:'Ciconia nigra', image:'https://images.unsplash.com/photo-1549608276-5786777e6587?w=400&h=400&fit=crop', protection:'国家一级保护', habit:'体长约100cm，上体黑色，下体白色，嘴和腿红色。栖息于河流两岸及沼泽湿地，繁殖期对人为干扰极为敏感。'},
            {name:'鸿雁', latin:'Anser cygnoides', image:'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=400&h=400&fit=crop', protection:'国家二级保护', habit:'大型雁类，体长约90cm，嘴黑色且近端有白环。每年10月迁经黄河湿地，常百只以上集群飞行，鸣声洪亮。'},
            {name:'普通鸬鹚', latin:'Phalacrocorax carbo', image:'https://images.unsplash.com/photo-1597055181449-56c9dddf6267?w=400&h=400&fit=crop', protection:'无危', habit:'中型水鸟，体长约80cm，通体黑色，繁殖期颈侧有白斑。擅长潜水捕鱼，常在岩石或树枝上晾翅。'},
            {name:'苍鹭', latin:'Ardea cinerea', image:'https://images.unsplash.com/photo-1558362477-2f648e4fe5a5?w=400&h=400&fit=crop', protection:'无危', habit:'大型鹭类，体长约95cm，头、颈白色，枕部有黑色冠羽。常单独站在浅水中等待猎物，以鱼类和蛙类为主食。'},
            {name:'大白鹭', latin:'Ardea alba', image:'https://images.unsplash.com/photo-1569163139599-0f4517e36f51?w=400&h=400&fit=crop', protection:'无危', habit:'体长约90cm，全身羽毛乳白色，繁殖期肩背部有饰羽。常见于黄河湿地浅水区，步态优雅，飞行时缩颈呈S形。'},
            {name:'斑嘴鸭', latin:'Anas poecilorhyncha', image:'https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?w=400&h=400&fit=crop', protection:'三有动物', habit:'中型鸭类，体长约60cm，嘴端具明显黄色斑块。为黄河湿地常见留鸟，适应能力强，常与其他鸭类混群活动。'},
            {name:'白尾鹞', latin:'Circus cyaneus', image:'https://images.unsplash.com/photo-1591375371043-34e159f3da31?w=400&h=400&fit=crop', protection:'国家二级保护', habit:'中型猛禽，体长约50cm，雄鸟上体灰色，下体白色，尾白色。栖息于芦苇沼泽和开阔草地，掠食鼠类和小型鸟类。'},
            {name:'震旦鸦雀', latin:'Calamornis heudei', image:'https://images.unsplash.com/photo-1558384062-612389d6d97e?w=400&h=400&fit=crop', protection:'国家二级保护', habit:'小型鸟类，体长约18cm，上体黄褐色，嘴呈锥形。是中国特有物种，仅栖息于芦苇沼泽，被视为湿地生态指示物种。'},
            {name:'小天鹅', latin:'Cygnus columbianus', image:'https://images.unsplash.com/photo-1559715541-5daf8a0296d0?w=400&h=400&fit=crop', protection:'国家二级保护', habit:'体长约120cm，通体白色，嘴端黑色。与大天鹅相似但体型略小，鸣声清脆，迁徙季节常数十只集群。'},
        ];

        let BIRD_DATA = [...YR_SPECIES_FALLBACK];

        // 从 API 加载黄河湿地真实物种数据
        (function loadSpecies() {
            $.ajax({ url: '/api/species/', method: 'GET', success: function(data) {
                const species = data.results || data;
                if (species && species.length > 0) {
                    BIRD_DATA = species.map(s => ({
                        name: s.name_cn,
                        latin: s.name_latin || '',
                        image: s.image || YR_SPECIES_FALLBACK.find(f => f.name === s.name_cn)?.image || YR_SPECIES_FALLBACK[0].image,
                        protection: s.protection_level || '未评级',
                        habit: s.distribution_habit || ''
                    }));
                }
            }});
        })();

        function protectionBadge(level) {
            if (!level) return '未评级';
            if (level.includes('一级')) return '一级保护';
            if (level.includes('二级')) return '二级保护';
            if (level.includes('三有')) return '三有动物';
            return '无危';
        }

        const game = {
            currentQuestion: 0,
            score: 0,
            combo: 0,
            maxCombo: 0,
            correctCount: 0,
            wrongCount: 0,
            totalQuestions: 10,
            questions: [],
            answers: [],

            start: function() {
                // 随机选择题目
                this.questions = this.shuffleArray([...BIRD_DATA]).slice(0, this.totalQuestions);
                this.currentQuestion = 0;
                this.score = 0;
                this.combo = 0;
                this.maxCombo = 0;
                this.correctCount = 0;
                this.wrongCount = 0;
                this.answers = [];

                $('#startScreen').hide();
                $('#resultScreen').hide();
                $('#gameScreen').show();

                this.showQuestion();
            },

            restart: function() {
                this.start();
            },

            shuffleArray: function(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            },

            showQuestion: function() {
                if (this.currentQuestion >= this.totalQuestions) {
                    this.showResult();
                    return;
                }

                const question = this.questions[this.currentQuestion];
                const progress = (this.currentQuestion / this.totalQuestions) * 100;

                // 更新进度
                $('#progressFill').css('width', progress + '%');
                $('#current').text(this.currentQuestion + 1);
                $('#score').text(this.score);
                $('#combo').text(this.combo);

                // 显示图片
                $('#birdImage').attr('src', question.image);
                $('#birdImageContainer').removeClass('correct wrong');

                // 生成选项
                const options = this.generateOptions(question);
                const optionsHtml = options.map((opt, index) =>
                    `<button class="option-btn" onclick="game.selectAnswer('${opt.name}', this)">${opt.name}</button>`
                ).join('');
                $('#optionsGrid').html(optionsHtml);
            },

            generateOptions: function(correctBird) {
                const options = [correctBird];
                const otherBirds = BIRD_DATA.filter(b => b.name !== correctBird.name);
                const shuffled = this.shuffleArray([...otherBirds]);

                for (let i = 0; i < 3 && i < shuffled.length; i++) {
                    options.push(shuffled[i]);
                }

                return this.shuffleArray(options);
            },

            selectAnswer: function(selectedName, btnElement) {
                const question = this.questions[this.currentQuestion];
                const isCorrect = selectedName === question.name;
                const container = $('#birdImageContainer');
                const buttons = $('.option-btn');

                // 禁用所有按钮
                buttons.attr('disabled', true);

                // 标记正确和错误答案
                buttons.each(function() {
                    if ($(this).text() === question.name) {
                        $(this).addClass('correct');
                    }
                });

                if (isCorrect) {
                    container.addClass('correct');
                    this.score += 10;
                    this.combo++;
                    this.correctCount++;

                    if (this.combo >= 3) {
                        this.score += 5; // 连击奖励
                        this.showComboEffect();
                    }

                    if (this.combo > this.maxCombo) {
                        this.maxCombo = this.combo;
                    }
                } else {
                    container.addClass('wrong');
                    $(btnElement).addClass('wrong');
                    this.combo = 0;
                    this.wrongCount++;
                }

                // 记录答案
                this.answers.push({
                    bird: question,
                    selected: selectedName,
                    correct: isCorrect
                });

                // 更新显示
                $('#score').text(this.score);
                $('#combo').text(this.combo);

                // 延迟进入下一题
                setTimeout(() => {
                    this.currentQuestion++;
                    this.showQuestion();
                }, 1200);
            },

            showComboEffect: function() {
                // 创建连击特效
                for (let i = 0; i < 5; i++) {
                    const sparkle = $('<div class="sparkle"></div>');
                    sparkle.css({
                        left: (Math.random() * 100) + '%',
                        top: (Math.random() * 100) + '%',
                        background: ['gold', 'orange', 'yellow'][Math.floor(Math.random() * 3)]
                    });
                    $('#birdImageContainer').append(sparkle);
                    setTimeout(() => sparkle.remove(), 600);
                }
            },

            showResult: function() {
                $('#gameScreen').hide();
                $('#resultScreen').show();

                $('#finalScore').text(this.score);
                $('#correctCount').text(this.correctCount);
                $('#wrongCount').text(this.wrongCount);
                $('#maxCombo').text(this.maxCombo);

                // 生成答题回顾（包含生态知识）
                const reviewHtml = this.answers.map((ans, index) => {
                    const iconClass = ans.correct ? 'correct' : 'wrong';
                    const iconText = ans.correct ? '&#10003;' : '&#10007;';
                    const selectedClass = ans.correct ? '' : 'style="color: var(--c-red)"';
                    const protBadge = protectionBadge(ans.bird.protection);
                    const habitText = ans.bird.habit ? `<div style="font-size:11px;color:#888;margin-top:4px;line-height:1.4;">${ans.bird.habit.slice(0,80)}…</div>` : '';
                    return `
                        <div class="review-item">
                            <div class="review-icon ${iconClass}">${iconText}</div>
                            <div style="flex:1">
                                <div style="font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                                    ${ans.bird.name}
                                    <span style="font-size:10px;${ans.bird.protection?.includes('一级')?'color:#e74c3c':ans.bird.protection?.includes('二级')?'color:#f39c12':'color:#888'}">${protBadge}</span>
                                </div>
                                <div style="font-size:12px;color:#666">
                                    <span>你的选择: </span>
                                    <span ${selectedClass}>${ans.selected}</span>
                                </div>
                                ${ans.correct ? habitText : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                $('#reviewList').html(reviewHtml);

                // 更新用户积分
                this.updateScore();
            },

            updateScore: function() {
                const token = localStorage.getItem('yb_token');
                if (!token) return;

                const earned = game.score;
                if (earned <= 0) return;

                $.ajax({
                    url: '/api/profiles/me/',
                    method: 'GET',
                    headers: { 'Authorization': 'Token ' + token },
                    success: function(data) {
                        const newScore = (data.score || 0) + earned;
                        $.ajax({
                            url: '/api/profiles/me/score/',
                            method: 'PATCH',
                            headers: { 'Authorization': 'Token ' + token, 'Content-Type': 'application/json' },
                            data: JSON.stringify({ score: newScore }),
                            error: function() {
                                console.log('积分更新失败');
                            }
                        });
                    }
                });
            }
        };
    </script>
</body>
</html>
